<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Agent HQ">
<title>Agent HQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#1a0e06;display:flex;justify-content:center;align-items:stretch;overflow:hidden;}
#wrap{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center;}
#canvas{display:block;height:100%;width:auto;max-width:100%;}
/* On desktop – constrain to 9:16 */
@media(min-aspect-ratio:9/16){
  #canvas{width:calc(100vh * 9 / 16);height:100%;}
}
.hud{position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:calc(min(100vw, 100vh * 9/16));
  height:44px;background:rgba(255,252,245,.92);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:10;pointer-events:none;
  border-bottom:1px solid rgba(180,140,80,.2);}
.hud-title{font:bold 13px/1 'Courier New',monospace;color:#8b5e1a;letter-spacing:2px;}
.hud-right{font:10px/1 'Courier New',monospace;color:#aaa;display:flex;gap:10px;align-items:center;}
.live{display:inline-block;width:7px;height:7px;background:#ff4444;border-radius:50%;
  animation:blink .9s infinite;margin-right:4px;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.panel{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:calc(min(100vw, 100vh * 9/16));
  background:rgba(255,252,245,.92);backdrop-filter:blur(10px);
  padding:7px 8px 10px;z-index:10;border-top:1px solid rgba(180,140,80,.2);}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:380px;margin:0 auto;}
.pcard{background:rgba(255,248,235,.95);border:1px solid rgba(200,160,80,.3);
  border-radius:6px;padding:4px 5px;display:flex;flex-direction:column;gap:2px;}
.pcard.active{border-color:rgba(80,180,80,.5);background:rgba(235,255,235,.95);}
.ptop{display:flex;align-items:center;gap:4px;}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pname{font:bold 7px/1 'Courier New',monospace;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ptask{font:6px/1.2 'Courier New',monospace;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pbar-bg{height:3px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden;}
.pbar{height:100%;border-radius:2px;transition:width .5s ease;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas"></canvas>
  <div class="hud">
    <div class="hud-title">🏢 AGENT HQ</div>
    <div class="hud-right">
      <span><span class="live"></span>LIVE</span>
      <span id="hud-time">--:--</span>
    </div>
  </div>
  <div class="panel">
    <div class="pgrid" id="pgrid"></div>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script>
window.addEventListener('error', e => { document.body.style.background='red'; console.error('GLOBAL ERROR', e.message, e.filename, e.lineno); });
window.addEventListener('unhandledrejection', e => { document.body.style.background='orange'; console.error('UNHANDLED REJECTION', e.reason); });
</script>
<script type="module">
import * as THREE from 'three';
console.log('Three.js loaded:', THREE.REVISION);

// ═══ AGENT DATA ═══
const agents = [
  {name:'Robo-1', status:'active',  task:'Data analysis',  color:0xee4444, hair:0x1a0a00, skin:0xffcc99},
  {name:'Robo-2', status:'active',  task:'Skill scouting', color:0x44bb55, hair:0x2a1800, skin:0xf5b570},
  {name:'Robo-3', status:'idle',    task:'Idle',           color:0x9955dd, hair:0x7a3c1a, skin:0xffdbac},
  {name:'Robo-4', status:'active',  task:'Web crawl',      color:0x4488ff, hair:0xf0d080, skin:0xffcc99},
  {name:'Robo-5', status:'active',  task:'Scheduling',     color:0xffaa22, hair:0x1a0a00, skin:0xc68642},
  {name:'Robo-6', status:'idle',    task:'Idle',           color:0x22cccc, hair:0x0a0505, skin:0x8d5524},
  {name:'Robo-7', status:'active',  task:'Moltbook',       color:0xff77aa, hair:0x8b1a00, skin:0xffdbac},
  {name:'Robo-8', status:'active',  task:'Report gen',     color:0x5599ff, hair:0xcc3300, skin:0xf1c27d},
  {name:'Robo-9', status:'idle',    task:'Idle',           color:0x55cc44, hair:0x2a1800, skin:0xffcc99},
  {name:'Robo-10',status:'active',  task:'Monitoring',     color:0xff5533, hair:0x3d1a00, skin:0xc68642},
];

// ═══ STATUS JSON (optional) ═══
fetch('./status.json').then(r=>r.json()).then(d=>{
  if(Array.isArray(d)) d.forEach((item,i)=>{ if(i<agents.length){ agents[i].status=item.status||agents[i].status; agents[i].task=item.task||agents[i].task; } });
  rebuildPanel();
}).catch(()=>rebuildPanel());

// ═══ THREE.JS SETUP ═══
const canvas = document.getElementById('canvas');

function getSize(){
  const wrap = document.getElementById('wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const targetAR = 9/16;
  if(ww/wh > targetAR){ return {w: Math.floor(wh*targetAR), h: wh}; }
  return {w: ww, h: Math.floor(ww/targetAR)};
}

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfff8ef);
scene.fog = new THREE.Fog(0xfff8ef, 28, 55);

const sz = getSize();
renderer.setSize(sz.w, sz.h);
const camera = new THREE.PerspectiveCamera(48, 9/16, 0.1, 80);
camera.position.set(6, 17, 17);
camera.lookAt(0, 1, -1);

window.addEventListener('resize', ()=>{
  const s = getSize();
  renderer.setSize(s.w, s.h);
  // camera AR stays 9/16
});

// ═══ LIGHTING ═══
// Warm ambient
scene.add(new THREE.AmbientLight(0xffeedd, 0.85));

// Main sun (warm, from top-left window)
const sun = new THREE.DirectionalLight(0xffd6a0, 2.2);
sun.position.set(-8, 20, 5);
sun.castShadow = true;
sun.shadow.camera.left = -14; sun.shadow.camera.right = 14;
sun.shadow.camera.top = 14; sun.shadow.camera.bottom = -14;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.bias = -0.0008;
scene.add(sun);

// Fill light (right side, cooler)
const fill = new THREE.DirectionalLight(0xeef4ff, 0.55);
fill.position.set(10, 8, -5); scene.add(fill);

// Warm point lights (pendant lamps)
const pendantPositions = [[-3,4.2,1],[1,4.2,1],[5,4.2,1],[-1,4.2,-4],[3,4.2,-4],[-3,4.2,-8],[3,4.2,-8]];
pendantPositions.forEach(p=>{ const pl=new THREE.PointLight(0xffd080,0.9,7); pl.position.set(...p); scene.add(pl); });

// ═══ MATERIALS ═══
const floorMat = new THREE.MeshStandardMaterial({color:0xc8955a,roughness:.65,metalness:.02});
const wallMatLight = new THREE.MeshStandardMaterial({color:0xfff5e8,roughness:.9});
const wallMatBack  = new THREE.MeshStandardMaterial({color:0xfaf0dc,roughness:.85});
const deskMat  = new THREE.MeshStandardMaterial({color:0xfafafa,roughness:.5,metalness:.02});
const deskLegMat = new THREE.MeshStandardMaterial({color:0xd0c8b8,roughness:.7,metalness:.1});
const monitorMat = new THREE.MeshStandardMaterial({color:0x222222,roughness:.5,metalness:.3});
const scrGlowMat = new THREE.MeshStandardMaterial({color:0x88aaff,emissive:new THREE.Color(0x5577cc),emissiveIntensity:.8,roughness:.2});
const chairMat = new THREE.MeshStandardMaterial({color:0xa09080,roughness:.8});
const chairLegMat = new THREE.MeshStandardMaterial({color:0x888880,roughness:.5,metalness:.4});
const rugMat = new THREE.MeshStandardMaterial({color:0xeee0cc,roughness:1});
const sofaMat = new THREE.MeshStandardMaterial({color:0xe8d9b8,roughness:.9});
const pillowMat = new THREE.MeshStandardMaterial({color:0xfff8f0,roughness:.9});
const tableMat = new THREE.MeshStandardMaterial({color:0xd4a96a,roughness:.6});
const lampMat = new THREE.MeshStandardMaterial({color:0x333333,roughness:.5,metalness:.6});
const lampShade = new THREE.MeshStandardMaterial({color:0xffeebb,emissive:new THREE.Color(0xffcc66),emissiveIntensity:.55,roughness:.7});
const potMat = new THREE.MeshStandardMaterial({color:0xd2745e,roughness:.9});
const leafMat = new THREE.MeshStandardMaterial({color:0x4a8a38,roughness:.85});
const leafMat2 = new THREE.MeshStandardMaterial({color:0x3a7a2a,roughness:.85});
const scrEdgeMat = new THREE.MeshStandardMaterial({color:0x2a2a35,roughness:.4,metalness:.5});
const windowMat = new THREE.MeshStandardMaterial({color:0xd4efff,transparent:true,opacity:.22,roughness:0,metalness:.05});
const frameMat  = new THREE.MeshStandardMaterial({color:0xf5f0e5,roughness:.7});

// ═══ HELPERS ═══
function box(w,h,d,mat,x,y,z,rx=0,ry=0,rz=0,cast=true,receive=true){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  m.castShadow=cast; m.receiveShadow=receive; scene.add(m); return m;
}
function cyl(rt,rb,h,seg,mat,x,y,z,cast=true){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z); m.castShadow=cast; m.receiveShadow=true; scene.add(m); return m;
}
function sph(r,seg,mat,x,y,z,cast=true){
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg*3/4),mat);
  m.position.set(x,y,z); m.castShadow=cast; m.receiveShadow=false; scene.add(m); return m;
}

// ═══ ROOM ═══
// Floor
box(32,0.18,30,floorMat,0,-0.09,-2,0,0,0,false,true);

// Back wall
box(32,10,0.25,wallMatBack,0,5,-12,0,0,0,false,true);
// Left wall
box(0.25,10,30,wallMatLight,-9,5,-2,0,0,0,false,true);
// Right wall (partial - open/window side)
box(0.25,10,12,wallMatLight,9,5,-8,0,0,0,false,true);

// ═══ WINDOWS (left wall) ═══
[[-9,1,0],[-9,1,-5],[-9,1,-10]].forEach(([x,y,z])=>{
  box(0.1,3.5,3.5,windowMat,x,4+y,z+1);
  // window frame
  box(0.15,3.7,0.15,frameMat,x,4+y,-1+z);
  box(0.15,3.7,0.15,frameMat,x,4+y,1+z);
  box(0.15,0.15,3.7,frameMat,x,5.8+y,z);
  box(0.15,0.15,3.7,frameMat,x,2.3+y,z);
});

// Right wall windows
box(3.5,3.5,0.1,windowMat,9,3.8,-1);
box(3.5,3.5,0.1,windowMat,9,3.8,-6);

// ═══ PENDANT LAMPS ═══
function makePendant(x,z){
  const g=new THREE.Group();
  // Cord
  const cord=new THREE.Mesh(new THREE.CylinderGeometry(.012,.012,3.2,6),lampMat);
  cord.position.y=-1.6; g.add(cord);
  // Shade
  const shade=new THREE.Mesh(new THREE.CylinderGeometry(.25,.08,.28,16,1,true),lampShade);
  shade.rotation.x=Math.PI; shade.position.y=-3.3; g.add(shade);
  // Bulb
  const bulb=new THREE.Mesh(new THREE.SphereGeometry(.07,10,8),lampShade);
  bulb.position.y=-3.15; g.add(bulb);
  g.position.set(x,7.2,z); scene.add(g); return g;
}
[[-3,1],[1,1],[5,1],[-1,-4],[3,-4],[-3,-8],[3,-8],[0,-10]].forEach(([x,z])=>makePendant(x,z));

// ═══ PLANTS ═══
function makePalmPlant(x,z,h=3.2){
  const g=new THREE.Group();
  // Pot
  const pot=new THREE.Mesh(new THREE.CylinderGeometry(.22,.17,.38,14),potMat);
  pot.position.y=.19; g.add(pot);
  // Trunk
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.055,.085,h,9),
    new THREE.MeshStandardMaterial({color:0x8b6340,roughness:.9}));
  trunk.position.y=.38+h/2; g.add(trunk);
  // Leaves
  const leafCount=5;
  for(let i=0;i<leafCount;i++){
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(.55+Math.random()*.25,10,6),
      i%2===0?leafMat:leafMat2);
    const ang=i/leafCount*Math.PI*2;
    leaf.scale.set(1,.25,1.8+Math.random()*.5);
    leaf.position.set(Math.cos(ang)*.55,h+.2+Math.random()*.15,Math.sin(ang)*.55);
    leaf.rotation.set(-.5+Math.random()*.3,ang,.2+Math.random()*.3);
    g.add(leaf);
  }
  g.position.set(x,0,z); scene.add(g); return g;
}
function makeSmallPlant(x,z){
  const g=new THREE.Group();
  const pot=new THREE.Mesh(new THREE.CylinderGeometry(.14,.10,.25,12),potMat);
  pot.position.y=.125; g.add(pot);
  const plant=new THREE.Mesh(new THREE.SphereGeometry(.22,10,8),leafMat);
  plant.scale.set(1,.8,1);plant.position.y=.42; g.add(plant);
  g.position.set(x,0,z); scene.add(g); return g;
}
makePalmPlant(-8.2,4.5,3.4); makePalmPlant(-8.2,-1,3.2); makePalmPlant(-8.2,-7.5,3.6);
makePalmPlant(7.5,-2,2.8); makePalmPlant(7.5,-9.5,3.0);
makeSmallPlant(-7.5,6.5); makeSmallPlant(0,-9.5); makeSmallPlant(5.5,3.5); makeSmallPlant(-1.5,6.5);

// ═══ BIG CURVED SCREEN ═══
const SC_W=640, SC_H=360;
const bigC=document.createElement('canvas'); bigC.width=SC_W; bigC.height=SC_H;
const bigCtx=bigC.getContext('2d');
const bigTex=new THREE.CanvasTexture(bigC);
const bigScrMat=new THREE.MeshStandardMaterial({
  map:bigTex,emissiveMap:bigTex,
  emissive:new THREE.Color(1,1,1),emissiveIntensity:1.4,
  roughness:.1,color:new THREE.Color(0,0,0)
});

// 3-panel curved screen on back wall
const panelW=4.5, panelH=2.6, panelD=.06;
[-1,0,1].forEach(i=>{
  const p=new THREE.Mesh(new THREE.BoxGeometry(panelW,panelH,panelD),bigScrMat);
  p.position.set(i*panelW*.96, 5.4, -11.6);
  p.rotation.y = i*-0.18;
  p.castShadow=false; scene.add(p);
});
// Screen edge frame
const sfm=scrEdgeMat;
box(panelW*3.1,.08,.12,sfm,0,4.08,-11.55); // bottom
box(panelW*3.1,.08,.12,sfm,0,6.73,-11.55); // top
box(.1,2.75,.12,sfm,-panelW*1.52,5.4,-11.55); // left
box(.1,2.75,.12,sfm, panelW*1.52,5.4,-11.55); // right
// Screen glow on floor
const glow=new THREE.PointLight(0x6699ff,.55,8); glow.position.set(0,5,-10); scene.add(glow);

// ═══ DIRECTOR DESK ═══
// Raised platform
box(8,.12,5,new THREE.MeshStandardMaterial({color:0xd4a96a,roughness:.7}),-0.5,.06,-8.8);

// Desk
box(4,.1,1.8,deskMat,-0.5,.82,-8.2);
box(3.6,.06,1.4,new THREE.MeshStandardMaterial({color:0xf0ede8,roughness:.4}),-0.5,.89,-8.2);
// Desk legs
[[-2.2,.46,-7.4],[-2.2,.46,-9.0],[1.2,.46,-7.4],[1.2,.46,-9.0]].forEach(([x,y,z])=>
  cyl(.04,.04,.82,8,deskLegMat,x,y,z));
// Director monitor
box(1.4,.06,.7,monitorMat,-0.5,1.0,-8.2);
box(1.3,1.0,.04,monitorMat,-0.5,1.55,-7.88);
box(.8,.06,.18,monitorMat,-0.5,1.0,-7.68);
// Monitor screen glow
box(1.2,.9,.02,scrGlowMat,-0.5,1.56,-7.86);
// Items on desk
sph(.06,8,new THREE.MeshStandardMaterial({color:0x44ff88,emissive:new THREE.Color(0x22aa44),emissiveIntensity:.8}),0.5,0.9,-8.0);
box(.35,.02,.25,new THREE.MeshStandardMaterial({color:0xffffff,roughness:.3}),-1.2,.91,-8.35);

// ═══ CHAIR BUILDER ═══
function makeChair(x,z,ry=0){
  const g=new THREE.Group();
  // Seat
  const seat=new THREE.Mesh(new THREE.BoxGeometry(.52,.07,.52),chairMat);
  seat.position.y=.46; g.add(seat);
  // Seat cushion
  const cush=new THREE.Mesh(new THREE.BoxGeometry(.48,.05,.48),
    new THREE.MeshStandardMaterial({color:0xb8a898,roughness:.9}));
  cush.position.y=.5; g.add(cush);
  // Back rest
  const back=new THREE.Mesh(new THREE.BoxGeometry(.52,.48,.06),chairMat);
  back.position.set(0,.74,.27); g.add(back);
  // Lumbar
  const lumbar=new THREE.Mesh(new THREE.BoxGeometry(.48,.12,.04),
    new THREE.MeshStandardMaterial({color:0x988878,roughness:.9}));
  lumbar.position.set(0,.5,.28); g.add(lumbar);
  // Legs
  [-.2,.2].forEach(ox=>[-0.06,.32].forEach(oz=>{
    const l=new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.46,7),chairLegMat);
    l.position.set(ox,.23,oz); g.add(l);
  }));
  g.position.set(x,0,z); g.rotation.y=ry;
  g.castShadow=true; scene.add(g); return g;
}

// ═══ AGENT CHARACTER BUILDER ═══
const agentGroups=[];
function makeAgent(agent,pos,ry=0){
  const g=new THREE.Group();
  const shirtM=new THREE.MeshStandardMaterial({color:agent.color,roughness:.8});
  const skinM =new THREE.MeshStandardMaterial({color:agent.skin,roughness:.7});
  const hairM =new THREE.MeshStandardMaterial({color:agent.hair,roughness:1.0});

  // Torso
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(.16,.20,.4,14),shirtM);
  torso.position.set(0,.88,0); torso.castShadow=true; g.add(torso);

  // Neck
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(.07,.08,.1,10),skinM);
  neck.position.set(0,1.12,0); g.add(neck);

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(.205,18,14),skinM);
  head.position.set(0,1.32,0); head.rotation.x=-.12; head.castShadow=true; g.add(head);

  // Hair (dome on top-back of head)
  const hair=new THREE.Mesh(new THREE.SphereGeometry(.22,14,10),hairM);
  hair.scale.set(1,.56,1.05); hair.position.set(0,1.42,-0.03); g.add(hair);

  // Ears
  [-1,1].forEach(s=>{
    const ear=new THREE.Mesh(new THREE.SphereGeometry(.065,8,6),skinM);
    ear.position.set(s*.22,1.31,0); ear.scale.set(.5,1,1); g.add(ear);
  });

  // Arms reaching to keyboard
  const armM=shirtM;
  const armGeo=new THREE.CylinderGeometry(.055,.065,.38,8);
  const lA=new THREE.Mesh(armGeo,armM);
  lA.position.set(-.22,.88,-.16); lA.rotation.set(Math.PI/2.6,0,.15); lA.castShadow=true; g.add(lA);
  const rA=new THREE.Mesh(armGeo,armM);
  rA.position.set(.22,.88,-.16); rA.rotation.set(Math.PI/2.6,0,-.15); rA.castShadow=true; g.add(rA);

  // Hands
  [-0.37,0.37].forEach(x=>{
    const h=new THREE.Mesh(new THREE.SphereGeometry(.075,8,6),skinM);
    h.scale.set(.9,1,1.3); h.position.set(x,.88,-.42); g.add(h);
  });

  g.position.set(...pos); g.rotation.y=ry;
  scene.add(g); agentGroups.push(g);
  return g;
}

// ═══ DESK ISLAND BUILDER ═══
function makeDeskIsland(cx,cz,ry=0,seats=[[-.75,1.1,-.52,Math.PI],[.75,1.1,-.52,Math.PI],[-.75,1.1,.52,0],[.75,1.1,.52,0]]){
  const g=new THREE.Group();
  // Table top (long shared desk)
  const top=new THREE.Mesh(new THREE.BoxGeometry(2.0,.07,1.12),deskMat);
  top.position.y=.88; g.add(top);
  // Surface panel
  const surf=new THREE.Mesh(new THREE.BoxGeometry(1.92,.04,1.04),
    new THREE.MeshStandardMaterial({color:0xf8f6f2,roughness:.4}));
  surf.position.y=.93; g.add(surf);
  // Legs
  [-0.88,.88].forEach(x=>[-0.48,.48].forEach(z=>{
    const l=new THREE.Mesh(new THREE.BoxGeometry(.06,.88,.06),deskLegMat);
    l.position.set(x,.44,z); g.add(l);
  }));
  // Cable tray
  const tray=new THREE.Mesh(new THREE.BoxGeometry(1.8,.04,.06),
    new THREE.MeshStandardMaterial({color:0xdddddd,roughness:.8}));
  tray.position.set(0,.42,0); g.add(tray);

  g.position.set(cx,0,cz); g.rotation.y=ry;
  g.castShadow=true; g.receiveShadow=true; scene.add(g);
  return g;
}

// Monitor + keyboard on desk
function addMonitor(x,y,z,ry=0,glowing=true){
  const g=new THREE.Group();
  // Base
  box(.6,.04,.35,monitorMat,0,0,0);
  // Stand
  const stg=new THREE.Group();
  const st=new THREE.Mesh(new THREE.BoxGeometry(.08,.28,.05),monitorMat);
  st.position.y=.16; stg.add(st);
  // Screen bezel
  const bz=new THREE.Mesh(new THREE.BoxGeometry(.78,.52,.045),monitorMat);
  bz.position.y=.55; stg.add(bz);
  // Screen content (glowing)
  if(glowing){
    const sc=new THREE.Mesh(new THREE.BoxGeometry(.7,.44,.025),
      new THREE.MeshStandardMaterial({color:0x88bbff,emissive:new THREE.Color(0x4488cc),emissiveIntensity:.9,roughness:.1}));
    sc.position.y=.55; sc.position.z=.02; stg.add(sc);
  }
  // Keyboard
  const kb=new THREE.Mesh(new THREE.BoxGeometry(.55,.025,.2),
    new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:.6}));
  kb.position.set(0,.03,.22); stg.add(kb);
  g.add(stg);
  const m=new THREE.Group(); m.add(g);
  m.position.set(x,y,z); m.rotation.y=ry; scene.add(m);
  return m;
}

// ═══ BIG SCREEN DRAW ═══
function drawBigScreen(t){
  const ctx=bigCtx;
  // Background gradient (dark blue dashboard)
  const gr=ctx.createLinearGradient(0,0,0,SC_H);
  gr.addColorStop(0,'#0d1e52'); gr.addColorStop(1,'#0a1638');
  ctx.fillStyle=gr; ctx.fillRect(0,0,SC_W,SC_H);

  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=.8;
  for(let x=0;x<=SC_W;x+=SC_W/10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,SC_H);ctx.stroke();}
  for(let y=0;y<=SC_H;y+=SC_H/6){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(SC_W,y);ctx.stroke();}

  // Left panel - agent cards (5x2)
  const startX=10, startY=18, cw=110, ch=72;
  ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(0,0,SC_W/2-5,SC_H);
  ctx.fillStyle='#aaccff'; ctx.font='bold 11px monospace';
  ctx.fillText('AGENT STATUS', startX, 14);

  agents.forEach((a,i)=>{
    const col=i%2, row=Math.floor(i/2);
    const x=startX+col*cw, y=startY+row*ch+5;
    const active=a.status==='active';
    // Card bg
    ctx.fillStyle=active?'rgba(30,80,40,.9)':'rgba(20,30,60,.8)';
    ctx.beginPath(); ctx.rect(x,y,cw-8,ch-8); ctx.fill();
    ctx.strokeStyle=active?'#00ee66':'#334488';
    ctx.lineWidth=1.2; ctx.beginPath(); ctx.rect(x,y,cw-8,ch-8); ctx.stroke();
    // Dot
    ctx.fillStyle=active?'#00ff66':'#4466aa';
    ctx.beginPath(); ctx.arc(x+10,y+12,4.5,0,Math.PI*2); ctx.fill();
    if(active){
      ctx.strokeStyle='rgba(0,255,100,.25)'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(x+10,y+12,8,0,Math.PI*2); ctx.stroke();
    }
    // Name
    ctx.fillStyle='#ffffff'; ctx.font='bold 10px monospace';
    ctx.fillText(a.name, x+20, y+15);
    // Task
    const tk=a.task.replace(/[\u0080-\uffff]/g,'').slice(0,13);
    ctx.fillStyle=active?'#88ffcc':'#7799bb'; ctx.font='8px monospace';
    ctx.fillText(tk||'Idle', x+8, y+30);
    // Bar
    ctx.fillStyle='rgba(255,255,255,.1)'; ctx.fillRect(x+8,y+ch-22,cw-24,6);
    if(active){
      const p=.3+(Math.sin(t*1.5+i*.85)+1)/2*.7;
      const bg=ctx.createLinearGradient(x+8,0,x+8+cw-24,0);
      bg.addColorStop(0,'#00ff88'); bg.addColorStop(1,'#00ccff');
      ctx.fillStyle=bg; ctx.fillRect(x+8,y+ch-22,(cw-24)*p,6);
    }
  });

  // Right panel - charts
  const rX=SC_W/2+8;
  ctx.fillStyle='#aaccff'; ctx.font='bold 11px monospace';
  ctx.fillText('SYSTEM METRICS', rX, 14);

  // Bar chart
  const activeCount=agents.filter(a=>a.status==='active').length;
  const barColors=['#00ff88','#00ccff','#ffaa22','#ff5566','#aa88ff'];
  ['Active','Tasks','API','Memory','Load'].forEach((label,i)=>{
    const bx=rX, by=28+i*44;
    const val=i===0?(activeCount/10):(.3+Math.sin(t*.8+i*1.3)*.25+.25);
    ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fillRect(bx,by+14,SC_W/2-20,10);
    ctx.fillStyle=barColors[i]; ctx.fillRect(bx,by+14,(SC_W/2-20)*val,10);
    ctx.fillStyle='#ccdeff'; ctx.font='9px monospace';
    ctx.fillText(label,bx,by+12);
    ctx.fillStyle='#ffffff'; ctx.font='bold 9px monospace';
    ctx.fillText(i===0?activeCount+'/'+(agents.length):Math.round(val*100)+'%',rX+SC_W/2-32,by+12);
  });

  // Wave at bottom
  const wY=SC_H-50;
  ctx.fillStyle='rgba(0,20,60,.5)'; ctx.fillRect(SC_W/2+8,wY,SC_W/2-8,50);
  ctx.fillStyle='#6699cc'; ctx.font='8px monospace'; ctx.fillText('NETWORK ACTIVITY',rX,wY+12);
  // Wave
  ctx.beginPath(); ctx.moveTo(rX, wY+36);
  for(let x=0;x<=SC_W/2-12;x+=2){
    const y2=wY+32-Math.sin(x/20+t)*8-Math.sin(x/8+t*1.4)*4;
    ctx.lineTo(rX+x,y2);
  }
  ctx.lineTo(SC_W-4,wY+50); ctx.lineTo(rX,wY+50); ctx.closePath();
  ctx.fillStyle='rgba(40,120,220,.3)'; ctx.fill();
  ctx.strokeStyle='#55aaff'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(rX, wY+32-Math.sin(t)*8);
  for(let x=0;x<=SC_W/2-12;x+=2) ctx.lineTo(rX+x,wY+32-Math.sin(x/20+t)*8-Math.sin(x/8+t*1.4)*4);
  ctx.stroke();

  bigTex.needsUpdate=true;
}

// ═══ PANEL BUILDER ═══
function rebuildPanel(){
  const g=document.getElementById('pgrid');
  if(!g) return;
  g.innerHTML=agents.map((a,i)=>{
    const active=a.status==='active';
    const dotC=active?'#44cc66':'#aaa';
    const barC=active?'linear-gradient(90deg,#44cc66,#22aaee)':'#ddd';
    const barW=active?Math.round(35+Math.random()*55)+'%':'8%';
    return `<div class="pcard${active?' active':''}" data-i="${i}">
      <div class="ptop"><div class="pdot" style="background:${dotC}"></div><div class="pname">${a.name}</div></div>
      <div class="ptask">${a.task.slice(0,14)}</div>
      <div class="pbar-bg"><div class="pbar" style="width:${barW};background:${barC}"></div></div>
    </div>`;
  }).join('');
}
rebuildPanel();
setInterval(()=>{
  document.querySelectorAll('.pcard.active .pbar').forEach(b=>{
    b.style.width=Math.round(30+Math.random()*60)+'%';
  });
},2000);

}

// ═══ ANIMATION LOOP ═══
const clock=new THREE.Clock();
let t=0;

// Init big screen
drawBigScreen(0);

function animate(){
  requestAnimationFrame(animate);
  t=clock.getElapsedTime();

  // Gentle breathing for agents
  agentGroups.forEach((g,i)=>{
    g.position.y=Math.sin(t*.45+i*.7)*.012;
  });

  // Slow camera drift (very subtle)
  camera.position.x=6+Math.sin(t*.06)*.25;
  camera.position.z=17+Math.sin(t*.04)*.2;
  camera.lookAt(0,1,-1);

  // Screen update
  drawBigScreen(t);

  renderer.render(scene,camera);
}
animate();
