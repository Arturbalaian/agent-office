<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Agent HQ">
<title>Agent HQ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #07071a;
  font-family: 'Courier New', monospace;
  color: #ccc;
  overflow-x: hidden;
}

.header {
  background: #0d0d25;
  border-bottom: 2px solid #00ff88;
  padding: 7px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top: 0; z-index: 99;
}
.h-title { font-size: 12px; color: #00ff88; letter-spacing: 2px; }
.h-right { font-size: 10px; color: #ffff44; display:flex; gap:10px; }
.live { display:inline-block; width:5px; height:5px; background:#ff3333; border-radius:50%; animation: lp .9s infinite; margin-right:3px; }
@keyframes lp { 0%,100%{opacity:1} 50%{opacity:.1} }

.floor { padding: 8px; display:flex; flex-direction:column; gap:8px; padding-bottom:44px; }

.zone { border:2px solid #1a2a40; border-radius:6px; position:relative; padding:14px 8px 8px; }
.zone-label {
  position:absolute; top:-9px; left:10px;
  background:#07071a; padding:0 6px;
  font-size:8px; letter-spacing:2px; text-transform:uppercase; color:#445566;
}

/* ── WORKER GRID ── */
.worker-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
@media (max-width: 500px) {
  .worker-grid { grid-template-columns: repeat(5, 1fr); }
}

/* ── WORKER CARD ── */
.wcard {
  background: #0c0c22;
  border: 1px solid #1a2040;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
  gap: 2px;
  position: relative;
  min-width: 0;
}
.wcard canvas { display:block; }

.status-dot {
  position:absolute; top:3px; right:3px;
  width:5px; height:5px; border-radius:50%;
  background:#223344;
}
.status-dot.on { background:#00ff88; box-shadow:0 0 4px #00ff88; animation:sdp 1.5s infinite; }
@keyframes sdp { 0%,100%{opacity:1} 50%{opacity:.3} }

.w-name { font-size:8px; color:#ffff88; font-weight:bold; letter-spacing:.5px; }

.w-task {
  font-size:7px; color:#6699aa;
  text-align:center;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  width:100%; padding:0 2px;
  min-height: 10px;
}
.w-task.active-task { color:#00ffcc; }

.act-wrap { width:90%; background:#111122; border:1px solid #223; height:4px; border-radius:2px; overflow:hidden; }
.act-bar { height:100%; background:#00ff88; border-radius:2px; width:15%; }
.act-bar.running { animation: actrun 1.2s ease-in-out infinite; box-shadow:0 0 3px #00ff88; }
@keyframes actrun { 0%{width:5%;margin-left:0} 50%{width:50%;margin-left:25%} 100%{width:5%;margin-left:90%} }

/* ── CORRIDOR ── */
.corridor {
  display:flex; align-items:center; justify-content:space-between;
  padding: 6px 12px; gap:6px; min-height:36px;
  border-color:#111120;
  background:#090912;
}
.corridor-path { flex:1; height:2px; background:repeating-linear-gradient(90deg,#1a2a40 0,#1a2a40 8px,transparent 8px,transparent 16px); }

/* ── MIDDLE ROW ── */
.mid-row { display:flex; gap:8px; }

/* ── REST ZONE ── */
.rest-zone { flex:1; background:#0a1018; border-color:#1a2530; }
.rest-items { display:flex; flex-direction:column; align-items:center; gap:8px; padding-top:4px; }
.sofa { font-size:32px; animation:sb 4s ease-in-out infinite; }
@keyframes sb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
.fridge-row { display:flex; align-items:center; gap:5px; background:#0d1520; border:1px solid #1a2535; padding:4px 8px; border-radius:3px; width:100%; justify-content:center; }
.free-tag { font-size:7px; color:#00ff88; background:#003311; border:1px solid #00ff8844; padding:1px 3px; border-radius:2px; }
.food-row { display:flex; gap:4px; font-size:14px; background:#0d1520; border:1px solid #1a2535; padding:4px 8px; border-radius:3px; width:100%; justify-content:center; }

/* ── DIRECTOR ZONE ── */
.dir-zone { flex:1.3; background:#0d0820; border-color:#2a1a40; }
.dir-inner { display:flex; flex-direction:column; align-items:center; gap:4px; }
.dir-plant { font-size:32px; animation:plantway 3s ease-in-out infinite; }
@keyframes plantway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
.dir-name { font-size:10px; color:#cc88ff; font-weight:bold; letter-spacing:2px; }
.dir-role { font-size:8px; color:#774499; }
.dir-task { font-size:8px; color:#00ffcc; min-height:11px; }
.dir-desk { background:#4a2d10; border:1px solid #6a3d18; border-bottom:3px solid #2a1a08; width:100%; padding:4px 8px; display:flex; align-items:center; justify-content:center; gap:6px; border-radius:2px; }
.macbook { width:30px; height:18px; background:#999; border:1px solid #bbb; border-radius:1px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.mb-screen { width:26px; height:15px; background:#100020; padding:1px; overflow:hidden; }
.mb-line { height:2px; background:#cc88ff; margin-bottom:1px; border-radius:1px; animation:mbl 1.1s ease-in-out infinite; }
@keyframes mbl { 0%{width:0%} 60%{width:100%} 100%{width:0%} }
.mb-base { width:34px; height:3px; background:#888; border-radius:0 0 2px 2px; }
.dir-act-wrap { width:90%; background:#1a1030; border:1px solid #332255; height:5px; border-radius:3px; overflow:hidden; }
.dir-act { height:100%; background:#cc88ff; border-radius:3px; animation:actrun 2s ease-in-out infinite; box-shadow:0 0 4px #cc88ff; }

/* ── TICKER ── */
.ticker { position:fixed; bottom:0; left:0; right:0; height:34px; background:#0d0d25; border-top:2px solid #00ff88; display:flex; align-items:center; overflow:hidden; }
.ticker-tag { background:#00ff88; color:#07071a; font-size:9px; font-weight:bold; padding:0 8px; height:100%; display:flex; align-items:center; flex-shrink:0; letter-spacing:1px; }
.ticker-body { display:flex; animation:tick 50s linear infinite; white-space:nowrap; font-size:10px; color:#00ffcc; }
@keyframes tick { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ti { margin:0 20px; }
.ti::before { content:'▶ '; color:#ff6b6b; }
</style>
</head>
<body>

<div class="header">
  <div class="h-title">🏢 AGENT HQ</div>
  <div class="h-right">
    <span id="active-count">0 active</span>
    <span><span class="live"></span><span id="clk">--:--</span></span>
  </div>
</div>

<div class="floor">

  <!-- WORKER ZONE -->
  <div class="zone" style="background:#0c0c20;border-color:#1a2050;">
    <div class="zone-label">⚡ Штат — 10 сотрудников</div>
    <div class="worker-grid" id="worker-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- CORRIDOR -->
  <div class="zone corridor">
    <div class="zone-label">🚶 Коридор</div>
    <span style="font-size:18px">🌴</span>
    <span style="font-size:13px">🌿</span>
    <div class="corridor-path"></div>
    <span style="font-size:13px">🌿</span>
    <span style="font-size:18px">🌵</span>
  </div>

  <!-- MIDDLE ROW -->
  <div class="mid-row">

    <!-- SECRETARY -->
    <div class="zone rest-zone" style="border-color:#2a1a40;">
      <div class="zone-label" style="color:#aa66ff;">🤖 Секретарь</div>
      <div class="rest-items">
        <canvas id="sec-canvas" width="60" height="68"></canvas>
        <div style="font:bold 9px monospace;color:#aa66ff;margin-top:2px;">СУБ-АГЕНТ</div>
        <div id="sec-task" style="font:7px monospace;color:#667799;text-align:center;max-width:110px;">💤 Ожидание задачи</div>
        <div style="height:3px;width:100px;background:#1a1a30;border-radius:2px;margin-top:4px;overflow:hidden;">
          <div id="sec-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#aa66ff,#6644cc);border-radius:2px;transition:width .5s;"></div>
        </div>
      </div>
    </div>

    <!-- DIRECTOR -->
    <div class="zone dir-zone">
      <div class="zone-label">👑 Директор</div>
      <div class="dir-inner">
        <div class="dir-plant">🌳</div>
        <canvas id="dir-canvas" width="80" height="90"></canvas>
        <div class="dir-name">РОБОЧЕЛОВЕК</div>
        <div class="dir-role">🤖 Главный агент</div>
        <div class="dir-task" id="dir-task">💬 На связи с Артуром</div>
        <div class="dir-desk">
          <div>
            <div class="macbook"><div class="mb-screen">
              <div class="mb-line"></div>
              <div class="mb-line" style="animation-delay:.3s"></div>
              <div class="mb-line" style="animation-delay:.6s"></div>
            </div></div>
            <div class="mb-base"></div>
          </div>
          <span style="font-size:13px">☕</span>
        </div>
        <div class="dir-act-wrap"><div class="dir-act"></div></div>
      </div>
    </div>

  </div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-tag">📡 ЭФИР</div>
  <div class="ticker-body" id="ticker"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ── AGENT DATA ──
const COLORS = [
  '#ff4466','#ff8800','#ffcc00','#44ff66','#00ffcc',
  '#00aaff','#8844ff','#ff44cc','#aaffaa','#ff6644'
];

const TASK_POOL = [
  '💤 Свободен',
  '💻 Пишет Python скрипт',
  '📊 Редактирует Excel',
  '📝 Создаёт Word документ',
  '🌐 Сёрфит интернет',
  '📄 Генерирует PDF',
  '🔍 Анализирует данные',
  '📧 Обрабатывает почту',
  '🗂️ Архивирует файлы',
  '🤖 Обучает модель',
  '🛠️ Чинит баги',
  '📱 Мониторит соцсети',
];

// State
const agents = Array.from({length:10}, (_, i) => ({
  id: i+1,
  name: `Robo-${i+1}`,
  color: COLORS[i],
  active: false,
  task: '💤 Свободен',
  scene: null, camera: null, renderer: null, mesh: null,
}));

// ── BUILD WORKER CARDS ──
const grid = document.getElementById('worker-grid');
agents.forEach(a => {
  const card = document.createElement('div');
  card.className = 'wcard';
  card.id = `card-${a.id}`;
  card.innerHTML = `
    <div class="status-dot" id="dot-${a.id}"></div>
    <canvas id="cv-${a.id}" width="60" height="68"></canvas>
    <div class="w-name">${a.name}</div>
    <div class="w-task" id="task-${a.id}">${a.task}</div>
    <div class="act-wrap"><div class="act-bar" id="bar-${a.id}"></div></div>
  `;
  grid.appendChild(card);
});

// ── THREE.JS CHARACTER FACTORY ──
function makeCharScene(canvasEl, color, scale=1) {
  const W = canvasEl.width, H = canvasEl.height;
  const renderer = new THREE.WebGLRenderer({canvas: canvasEl, antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(0, 0.3, 3.5);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(2, 4, 3);
  scene.add(dir);

  const mat = new THREE.MeshPhongMaterial({color: new THREE.Color(color), shininess:60});
  const darkMat = new THREE.MeshPhongMaterial({color: 0x111133});
  const eyeMat = new THREE.MeshPhongMaterial({color: 0xffffff, emissive: new THREE.Color(color), emissiveIntensity:.5});

  const group = new THREE.Group();
  group.scale.setScalar(scale);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3,16,12), mat);
  head.position.y = 0.75;
  group.add(head);

  // Eyes
  [-0.12, 0.12].forEach(x => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8), eyeMat);
    eye.position.set(x, 0.8, 0.27);
    group.add(eye);
  });

  // Body
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.26,0.55,12), mat);
  body.position.y = 0.18;
  group.add(body);

  // Arms
  const armGeo = new THREE.CylinderGeometry(0.07,0.07,0.4,8);
  [-1,1].forEach(side => {
    const arm = new THREE.Mesh(armGeo, mat);
    arm.position.set(side*0.34, 0.22, 0);
    arm.rotation.z = side * 0.4;
    arm.userData.isArm = true;
    arm.userData.side = side;
    group.add(arm);
  });

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.09,0.08,0.4,8);
  [-1,1].forEach(side => {
    const leg = new THREE.Mesh(legGeo, mat);
    leg.position.set(side*0.14, -0.28, 0);
    group.add(leg);
  });

  scene.add(group);

  return {renderer, scene, camera, group, head};
}

// Init all worker characters
agents.forEach(a => {
  const cv = document.getElementById(`cv-${a.id}`);
  const {renderer, scene, camera, group, head} = makeCharScene(cv, a.color);
  a.renderer = renderer; a.scene = scene; a.camera = camera;
  a.group = group; a.head = head;
  a.phase = Math.random() * Math.PI * 2;
});

// Director character
const dirCv = document.getElementById('dir-canvas');
const dir3d = makeCharScene(dirCv, '#00cc44', 1.3);
dir3d.phase = 0;

// ── ANIMATION LOOP ──
function animate(t) {
  requestAnimationFrame(animate);
  const time = t * 0.001;

  agents.forEach(a => {
    const ph = a.phase;
    const speed = a.active ? 2.5 : 0.8;
    const amp = a.active ? 0.06 : 0.02;

    a.group.position.y = Math.sin(time * speed + ph) * amp;
    a.group.rotation.y = Math.sin(time * 0.5 + ph) * 0.15;
    a.head.rotation.y = a.active ? Math.sin(time * 2 + ph) * 0.2 : 0;

    a.group.children.forEach(c => {
      if (c.userData.isArm) {
        c.rotation.z = c.userData.side * (0.4 + (a.active ? Math.sin(time * 3 + ph) * 0.3 : 0));
      }
    });

    a.renderer.render(a.scene, a.camera);
  });

  // Director
  dir3d.group.position.y = Math.sin(time * 1.2) * 0.03;
  dir3d.group.rotation.y = Math.sin(time * 0.4) * 0.1;
  dir3d.renderer.render(dir3d.scene, dir3d.camera);
}
animate(0);

// ── STATE UPDATES ──
function setAgent(id, active, task) {
  const a = agents[id-1];
  a.active = active;
  a.task = task;

  const dot = document.getElementById(`dot-${id}`);
  const taskEl = document.getElementById(`task-${id}`);
  const bar = document.getElementById(`bar-${id}`);

  dot.className = 'status-dot' + (active ? ' on' : '');
  taskEl.textContent = task;
  taskEl.className = 'w-task' + (active ? ' active-task' : '');
  bar.className = 'act-bar' + (active ? ' running' : '');

  updateCount();
  updateTicker();
}

function updateCount() {
  const n = agents.filter(a => a.active).length;
  document.getElementById('active-count').textContent = `${n} active`;
}

// Expose globally so parent can call
window.setAgent = setAgent;

// ── TICKER ──
function updateTicker() {
  const items = [
    'Робочеловек на связи с Артуром',
    ...agents.filter(a=>a.active).map(a=>`${a.name}: ${a.task.replace(/^\S+\s/,'')}`),
    ...agents.filter(a=>!a.active).slice(0,3).map(a=>`${a.name}: свободен`),
    'Cola в холодильнике FREE 🥤',
  ];
  const doubled = [...items, ...items];
  document.getElementById('ticker').innerHTML = doubled.map(t=>`<span class="ti">${t}</span>`).join('');
}
updateTicker();

// ── CLOCK ──
setInterval(()=>{
  const n=new Date();
  document.getElementById('clk').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
},1000);

// ── LOAD REAL STATUS FROM status.json ──
function loadStatus() {
  fetch('./status.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      // Обновляем секретаря
      if (data.subagent) updateSecretary(data);
      const list = Array.isArray(data) ? data : (data.agents || []);
      list.forEach((item, i) => {
        if (i >= agents.length) return;
        const active = item.status === 'active';
        const task = item.task || (active ? '⚙️ Задача' : '💤 Свободен');
        setAgent(i + 1, active, active ? '⚙️ ' + task : '💤 Свободен');
      });
    })
    .catch(() => {
      // Fallback: первые 6 активны
      setAgent(1, true, '🦞 Патрулирует Moltbook');
      setAgent(2, true, '🌐 Сёрфит интернет');
      setAgent(3, true, '📊 Редактирует Excel');
      setAgent(4, true, '⚙️ Web crawl');
      setAgent(5, true, '📡 Monitoring');
      setAgent(7, true, '📋 Report gen');
    });
}

// Первый запуск + обновление каждые 30 сек
loadStatus();
setInterval(loadStatus, 30000);

// ── SECRETARY SUB-AGENT ──
const secCanvas = document.getElementById('sec-canvas');
if (secCanvas) {
  makeCharScene(secCanvas, 0xaa66ff, 0.85);
}

// Секретарь читает sub-agent статус из status.json
function updateSecretary(data) {
  const secTask = document.getElementById('sec-task');
  const secBar = document.getElementById('sec-bar');
  if (!secTask) return;
  const sub = data && data.subagent;
  if (sub && sub.status === 'active') {
    secTask.textContent = '⚙️ ' + (sub.task || 'Работает');
    secTask.style.color = '#aa66ff';
    let w = 0;
    const iv = setInterval(() => { w = (w + 3) % 100; if(secBar) secBar.style.width = w + '%'; }, 150);
    setTimeout(() => clearInterval(iv), 10000);
  } else {
    secTask.textContent = '💤 Ожидание задачи';
    secTask.style.color = '#667799';
    if (secBar) secBar.style.width = '0%';
  }
}

// Expose для обновления секретаря снаружи
window.setSecretaryTask = function(task) {
  const el = document.getElementById('sec-task');
  const bar = document.getElementById('sec-bar');
  if (el) { el.textContent = '⚙️ ' + task; el.style.color = '#aa66ff'; }
  if (bar) { bar.style.width = '75%'; }
};

</script>
</body>
</html>
