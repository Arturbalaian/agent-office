<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Agent HQ">
<title>Agent HQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#111;display:flex;justify-content:center;align-items:stretch;overflow:hidden;font-family:'Courier New',monospace;}
#app{position:relative;height:100%;aspect-ratio:9/16;max-width:100%;overflow:hidden;background:#222;}
#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;}

/* HUD top */
.hud{position:absolute;top:0;left:0;right:0;height:44px;
  background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;z-index:20;pointer-events:none;}
.hud-title{font:bold 12px/1 'Courier New',monospace;color:#fff;letter-spacing:2px;text-shadow:0 1px 4px rgba(0,0,0,.8);}
.hud-right{font:10px/1 monospace;color:rgba(255,255,255,.7);display:flex;gap:10px;align-items:center;}
.live-dot{width:7px;height:7px;background:#ff4444;border-radius:50%;animation:blink .9s infinite;display:inline-block;margin-right:3px;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* Big screen overlay */
#screen-overlay{position:absolute;left:38%;top:9%;width:32%;height:20%;
  background:rgba(10,20,60,.82);border:1px solid rgba(100,150,255,.3);
  border-radius:4px;z-index:15;overflow:hidden;padding:4px;}
#screen-canvas{width:100%;height:100%;}

/* Agent badges */
.agent-badge{
  position:absolute;
  width:28px;height:28px;
  border-radius:50%;
  border:2px solid;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font:bold 7px monospace;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.9);
  transition:transform .2s,box-shadow .2s;
  z-index:18;
  backdrop-filter:blur(2px);
}
.agent-badge:hover{transform:scale(1.35);z-index:25;}
.agent-badge.active{
  background:rgba(0,200,80,.45);border-color:#00ff66;
  box-shadow:0 0 10px rgba(0,255,100,.5),0 0 20px rgba(0,255,100,.2);
  animation:pulse-green 2s infinite;
}
.agent-badge.idle{
  background:rgba(80,80,100,.45);border-color:#8899bb;
  box-shadow:0 0 6px rgba(100,120,180,.3);
}
@keyframes pulse-green{0%,100%{box-shadow:0 0 8px rgba(0,255,100,.4)}50%{box-shadow:0 0 18px rgba(0,255,100,.7)}}

/* Badge number */
.badge-num{font-size:7px;font-weight:bold;}

/* Tooltip popup */
.tooltip{
  position:absolute;z-index:30;
  background:rgba(10,15,30,.95);border:1px solid rgba(100,180,255,.4);
  border-radius:8px;padding:8px 10px;min-width:130px;
  pointer-events:none;opacity:0;transition:opacity .15s;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
}
.tooltip.show{opacity:1;}
.tt-name{font:bold 11px monospace;color:#fff;margin-bottom:3px;}
.tt-status{font:9px monospace;margin-bottom:4px;}
.tt-status.active{color:#44ff88;}
.tt-status.idle{color:#8899bb;}
.tt-task{font:8px monospace;color:#aac;border-top:1px solid rgba(255,255,255,.1);padding-top:4px;}
.tt-bar-bg{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:4px;overflow:hidden;}
.tt-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#44ff88,#00ccff);}

/* Director badge (larger) */
.director-badge{
  position:absolute;width:34px;height:34px;border-radius:50%;
  border:2px solid #ffd700;
  background:rgba(60,40,0,.55);
  box-shadow:0 0 12px rgba(255,215,0,.5);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font:bold 8px monospace;color:#ffd700;text-shadow:0 1px 3px #000;
  z-index:18;
  animation:pulse-gold 3s infinite;
}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.4)}50%{box-shadow:0 0 22px rgba(255,215,0,.7)}}

/* Bottom panel */
.panel{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(5,8,20,.97) 80%,transparent);
  padding:8px 8px 12px;z-index:20;
}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.pcard{
  background:rgba(20,28,50,.9);border:1px solid rgba(80,110,180,.25);
  border-radius:6px;padding:4px 5px;cursor:pointer;
  transition:border-color .2s,background .2s;
}
.pcard.active{border-color:rgba(0,220,100,.5);background:rgba(0,40,20,.9);}
.pcard-top{display:flex;align-items:center;gap:3px;margin-bottom:2px;}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.pname{font:bold 7px monospace;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ptask{font:6px monospace;color:#778;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pbar-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:2px;}
.pbar{height:100%;border-radius:2px;transition:width .6s ease;}
</style>
</head>
<body>
<div id="app">
  <img id="bg" src="bg.jpg" alt="">

  <!-- HUD -->
  <div class="hud">
    <div class="hud-title">🏢 AGENT HQ</div>
    <div class="hud-right">
      <span><span class="live-dot"></span>LIVE</span>
      <span id="hud-time">--:--</span>
    </div>
  </div>

  <!-- Big screen overlay -->
  <div id="screen-overlay">
    <canvas id="screen-canvas"></canvas>
  </div>

  <!-- Director badge -->
  <div class="director-badge" style="left:61%;top:29%" id="dir-badge" title="Director">★</div>

  <!-- Agent badges (positioned over characters) -->
  <!-- Will be injected by JS -->
  <div id="badges"></div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip">
    <div class="tt-name" id="tt-name"></div>
    <div class="tt-status" id="tt-status"></div>
    <div class="tt-task" id="tt-task"></div>
    <div class="tt-bar-bg"><div class="tt-bar" id="tt-bar" style="width:50%"></div></div>
  </div>

  <!-- Bottom panel -->
  <div class="panel">
    <div class="pgrid" id="pgrid"></div>
  </div>
</div>

<script>
// ═══ AGENT DATA ═══
const agents = [
  {name:'Robo-1',  status:'active', task:'Data analysis',  color:'#ee4444', left:'16%', top:'38%'},
  {name:'Robo-2',  status:'active', task:'Skill scouting', color:'#44bb55', left:'27%', top:'36%'},
  {name:'Robo-3',  status:'idle',   task:'Idle',           color:'#9955dd', left:'37%', top:'32%'},
  {name:'Robo-4',  status:'active', task:'Web crawl',      color:'#4488ff', left:'47%', top:'37%'},
  {name:'Robo-5',  status:'active', task:'Scheduling',     color:'#ffaa22', left:'74%', top:'41%'},
  {name:'Robo-6',  status:'idle',   task:'Idle',           color:'#22cccc', left:'24%', top:'45%'},
  {name:'Robo-7',  status:'active', task:'Moltbook',       color:'#ff77aa', left:'34%', top:'47%'},
  {name:'Robo-8',  status:'active', task:'Report gen',     color:'#5599ff', left:'17%', top:'54%'},
  {name:'Robo-9',  status:'idle',   task:'Idle',           color:'#55cc44', left:'51%', top:'54%'},
  {name:'Robo-10', status:'active', task:'Monitoring',     color:'#ff5533', left:'67%', top:'61%'},
];

// Load status.json if available
fetch('./status.json').then(r=>r.json()).then(d=>{
  if(Array.isArray(d)) d.forEach((item,i)=>{
    if(i<agents.length){ agents[i].status=item.status||agents[i].status; agents[i].task=item.task||agents[i].task; }
  });
  buildAll();
}).catch(()=>buildAll());

// ═══ BUILD BADGES ═══
function buildAll(){
  buildBadges();
  buildPanel();
  buildScreen();
}

function buildBadges(){
  const container = document.getElementById('badges');
  container.innerHTML = '';
  agents.forEach((a,i)=>{
    const el = document.createElement('div');
    el.className = `agent-badge ${a.status}`;
    el.style.left = a.left;
    el.style.top = a.top;
    el.style.borderColor = a.status==='active' ? '#00ff66' : '#8899bb';
    el.style.transform = 'translate(-50%,-50%)';
    el.innerHTML = `<span class="badge-num">${i+1}</span>`;
    el.addEventListener('mouseenter', (e) => showTooltip(e, a, i));
    el.addEventListener('mouseleave', hideTooltip);
    el.addEventListener('click', (e) => showTooltip(e, a, i));
    container.appendChild(el);
  });
}

// ═══ TOOLTIP ═══
const tooltip = document.getElementById('tooltip');
function showTooltip(e, a, i){
  const app = document.getElementById('app');
  const rect = app.getBoundingClientRect();
  const bRect = e.currentTarget.getBoundingClientRect();
  let lx = (bRect.left - rect.left + 20) / rect.width * 100;
  let ty = (bRect.top - rect.top - 10) / rect.height * 100;
  if(lx > 60) lx -= 42;
  if(ty < 10) ty = (bRect.bottom - rect.top + 5) / rect.height * 100;

  document.getElementById('tt-name').textContent = a.name;
  const ts = document.getElementById('tt-status');
  ts.textContent = a.status === 'active' ? '● ACTIVE' : '○ IDLE';
  ts.className = `tt-status ${a.status}`;
  document.getElementById('tt-task').textContent = a.task;
  const bar = document.getElementById('tt-bar');
  bar.style.width = a.status==='active' ? Math.round(35+Math.random()*55)+'%' : '8%';

  tooltip.style.left = lx+'%';
  tooltip.style.top = ty+'%';
  tooltip.classList.add('show');
}
function hideTooltip(){ tooltip.classList.remove('show'); }

// Director tooltip
document.getElementById('dir-badge').addEventListener('mouseenter', (e)=>{
  showTooltip(e, {name:'Director', status:'active', task:'Orchestrating agents'}, -1);
});
document.getElementById('dir-badge').addEventListener('mouseleave', hideTooltip);

// ═══ BOTTOM PANEL ═══
function buildPanel(){
  const g = document.getElementById('pgrid');
  g.innerHTML = agents.map((a,i)=>{
    const active = a.status==='active';
    const dotC = active ? '#44cc66' : '#667788';
    const barC = active ? 'linear-gradient(90deg,#44cc66,#22aaee)' : '#334';
    const barW = active ? Math.round(30+Math.random()*60)+'%' : '8%';
    return `<div class="pcard${active?' active':''}" title="${a.task}">
      <div class="pcard-top"><div class="pdot" style="background:${dotC}"></div><div class="pname">${a.name}</div></div>
      <div class="ptask">${a.task.slice(0,13)}</div>
      <div class="pbar-bg"><div class="pbar" style="width:${barW};background:${barC}"></div></div>
    </div>`;
  }).join('');
}

// Animate bars
setInterval(()=>{
  document.querySelectorAll('.pcard.active .pbar').forEach(b=>{
    b.style.width = Math.round(25+Math.random()*65)+'%';
  });
},2500);

// ═══ SCREEN CANVAS (mini dashboard) ═══
function buildScreen(){
  const canvas = document.getElementById('screen-canvas');
  const overlay = document.getElementById('screen-overlay');
  canvas.width = overlay.clientWidth * window.devicePixelRatio;
  canvas.height = overlay.clientHeight * window.devicePixelRatio;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  drawScreen(ctx, canvas.width/window.devicePixelRatio, canvas.height/window.devicePixelRatio, 0);

  let t=0;
  setInterval(()=>{
    t += 0.05;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawScreen(ctx, canvas.width/window.devicePixelRatio, canvas.height/window.devicePixelRatio, t);
  }, 100);
}

function drawScreen(ctx, W, H, t){
  const active = agents.filter(a=>a.status==='active').length;
  // BG
  ctx.fillStyle='rgba(8,12,40,.95)'; ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(100,150,255,.08)'; ctx.lineWidth=.5;
  for(let x=0;x<W;x+=W/8){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=H/5){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Title
  ctx.fillStyle='rgba(100,150,255,.7)'; ctx.font=`bold ${Math.max(7,H*.09)}px monospace`;
  ctx.fillText('AGENT STATUS', 4, H*.12);

  // Active count
  ctx.fillStyle='#00ff88'; ctx.font=`bold ${Math.max(14,H*.22)}px monospace`;
  ctx.fillText(active, W*.72, H*.38);
  ctx.fillStyle='rgba(255,255,255,.4)'; ctx.font=`${Math.max(6,H*.08)}px monospace`;
  ctx.fillText('/'+agents.length+' active', W*.72, H*.5);

  // Mini bars per agent
  const bh = H*.055, gap = H*.01, startY = H*.18;
  const bw = W*.58;
  agents.forEach((a,i)=>{
    const y = startY + i*(bh+gap);
    if(y+bh > H*.95) return;
    const isActive = a.status==='active';
    ctx.fillStyle=isActive?'rgba(0,80,40,.6)':'rgba(20,25,50,.5)';
    ctx.fillRect(2, y, bw, bh);
    if(isActive){
      const p = .25+(Math.sin(t*1.4+i*.9)+1)/2*.75;
      ctx.fillStyle=a.color||'#44cc88';
      ctx.fillRect(2, y, bw*p, bh);
    }
    ctx.fillStyle='rgba(255,255,255,.65)'; ctx.font=`${Math.max(5,bh*.7)}px monospace`;
    ctx.fillText(a.name, 4, y+bh*.78);
  });

  // Wave
  const wY = H*.82;
  ctx.strokeStyle='rgba(80,160,255,.6)'; ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<=W*.62;x+=1.5){
    const y2 = wY + Math.sin(x/6+t)*H*.05 + Math.sin(x/3+t*1.5)*H*.025;
    x===0 ? ctx.moveTo(x,y2) : ctx.lineTo(x,y2);
  }
  ctx.stroke();
}

// ═══ CLOCK ═══
function tick(){
  const el = document.getElementById('hud-time');
  if(el) el.textContent = new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick, 30000);
</script>
</body>
</html>
