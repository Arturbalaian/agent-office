<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agent HQ">
<title>Agent HQ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a0916; }

#canvas { display:block; width:100%; height:100%; }

/* ── HEADER OVERLAY ── */
.hud-top {
  position:fixed; top:0; left:0; right:0;
  height:38px;
  background:linear-gradient(180deg,rgba(10,9,22,.97) 70%,transparent);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 14px; z-index:10; pointer-events:none;
}
.hud-title { font-family:'Courier New',monospace; font-size:13px; color:#00ff88; letter-spacing:3px; text-shadow:0 0 10px #00ff88; }
.hud-right { font-family:'Courier New',monospace; font-size:10px; color:#ffff44; display:flex; gap:12px; }
.live-dot { display:inline-block; width:6px; height:6px; background:#ff3333; border-radius:50%; animation:lp .9s infinite; margin-right:4px; }
@keyframes lp{0%,100%{opacity:1}50%{opacity:.1}}

/* ── AGENT PANEL ── */
.agent-panel {
  position:fixed; bottom:0; left:0; right:0;
  background:linear-gradient(0deg,rgba(10,9,22,.98) 80%,transparent);
  padding:8px 8px 10px;
  z-index:10;
}
.panel-grid {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:5px;
  max-width:600px;
  margin:0 auto;
}
.pcard {
  background:rgba(13,13,37,.9);
  border:1px solid #1a2040;
  border-radius:5px;
  padding:4px 5px;
  display:flex; flex-direction:column; gap:2px;
  transition: border-color .3s;
}
.pcard.active { border-color:#00ff8866; }
.pcard-top { display:flex; align-items:center; gap:4px; }
.pdot { width:5px; height:5px; border-radius:50%; background:#223344; flex-shrink:0; }
.pdot.on { background:#00ff88; box-shadow:0 0 4px #00ff88; animation:sdp 1.5s infinite; }
@keyframes sdp{0%,100%{opacity:1}50%{opacity:.3}}
.pname { font-family:'Courier New',monospace; font-size:8px; color:#ffff88; font-weight:bold; flex:1; }
.ptask { font-family:'Courier New',monospace; font-size:7px; color:#445566; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ptask.on { color:#00ffcc; }
.pbar-wrap { height:3px; background:#111122; border-radius:2px; overflow:hidden; }
.pbar { height:100%; background:#223344; border-radius:2px; width:15%; }
.pbar.run { background:#00ff88; animation:pr 1.1s ease-in-out infinite; }
@keyframes pr{0%{width:5%;margin-left:0}50%{width:45%;margin-left:25%}100%{width:5%;margin-left:90%}}

/* ── TICKER ── */
.ticker {
  font-family:'Courier New',monospace;
  font-size:9px; color:#334455;
  text-align:center;
  margin-top:5px;
  white-space:nowrap; overflow:hidden;
}
.ticker-inner { display:inline-block; animation:tick 40s linear infinite; }
@keyframes tick{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD TOP -->
<div class="hud-top">
  <div class="hud-title">🏢 AGENT HQ</div>
  <div class="hud-right">
    <span id="active-label">— active</span>
    <span><span class="live-dot"></span><span id="clk">--:--</span></span>
  </div>
</div>

<!-- AGENT STATUS PANEL -->
<div class="agent-panel">
  <div class="panel-grid" id="pgrid"></div>
  <div class="ticker"><span class="ticker-inner" id="tick-inner">loading...</span></div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════
//  AGENT DATA
// ═══════════════════════════════════════════════
const SKIN_TONES = ['#ffcc99','#f5cba7','#e8b88a','#d4956a','#c68642','#8d5524','#ffddbb','#ffe0bd','#ffd5b5','#ffcba4'];
const HAIR_COLORS = ['#2c1810','#8B4513','#D4A017','#ff6b35','#4a4a6a','#1a1a2e','#8B0000','#556B2F','#191970','#483D8B'];
const SHIRT_COLORS = ['#2244cc','#cc2244','#22cc44','#cc8822','#8822cc','#22aacc','#cc4422','#44cc88','#aa22cc','#2288aa'];

const agents = Array.from({length:10},(_,i)=>({
  id:i+1, name:`Robo-${i+1}`,
  skin: SKIN_TONES[i], hair: HAIR_COLORS[i], shirt: SHIRT_COLORS[i],
  status:'idle', task:'Свободен',
  mesh: null, label: null, phase: Math.random()*Math.PI*2
}));

// ═══════════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0916);
scene.fog = new THREE.Fog(0x0a0916, 18, 35);

// Camera — isometric-ish
const camera = new THREE.PerspectiveCamera(40, W()/H(), 0.1, 100);
camera.position.set(0, 14, 16);
camera.lookAt(0, 0, 0);

// Resize
window.addEventListener('resize', ()=>{
  renderer.setSize(W(),H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
});

// ═══════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════
// Ambient
scene.add(new THREE.AmbientLight(0x8899cc, 0.4));

// Main overhead
const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
sun.position.set(5, 12, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 50;
sun.shadow.camera.left = -12;
sun.shadow.camera.right = 12;
sun.shadow.camera.top = 12;
sun.shadow.camera.bottom = -12;
scene.add(sun);

// Fill
const fill = new THREE.DirectionalLight(0x8899ff, 0.3);
fill.position.set(-5, 5, -5);
scene.add(fill);

// Accent lights (office ceiling)
const ceilPositions = [[-3,4,-1],[3,4,-1],[0,4,2]];
ceilPositions.forEach(([x,y,z])=>{
  const pl = new THREE.PointLight(0xfff5cc, 0.8, 8);
  pl.position.set(x,y,z);
  scene.add(pl);
  // Light fixture
  const fix = new THREE.Mesh(
    new THREE.BoxGeometry(0.6,0.05,0.6),
    new THREE.MeshStandardMaterial({color:0xfff5cc, emissive:0xfff5cc, emissiveIntensity:1})
  );
  fix.position.set(x,y+0.3,z);
  scene.add(fix);
});

// Director office accent
const dirLight = new THREE.PointLight(0xcc88ff, 0.6, 6);
dirLight.position.set(4, 3, -3);
scene.add(dirLight);

// ═══════════════════════════════════════════════
//  MATERIALS
// ═══════════════════════════════════════════════
const floorMat = new THREE.MeshStandardMaterial({color:0x12122a, roughness:.9, metalness:.0});
const wallMat  = new THREE.MeshStandardMaterial({color:0x0e0e24, roughness:.8});
const glassMat = new THREE.MeshStandardMaterial({color:0x88aabb, transparent:true, opacity:.15, roughness:0, metalness:.2});
const deskMat  = new THREE.MeshStandardMaterial({color:0x3d2b18, roughness:.7});
const deskDarkMat = new THREE.MeshStandardMaterial({color:0x1a0e08, roughness:.9});
const chairMat = new THREE.MeshStandardMaterial({color:0x1a1a35, roughness:.6});
const chairLegMat = new THREE.MeshStandardMaterial({color:0x888899, metalness:.7, roughness:.3});
const plantMat = new THREE.MeshStandardMaterial({color:0x1a5c2a, roughness:.9});
const potMat   = new THREE.MeshStandardMaterial({color:0x8B4513, roughness:.8});
const rugMat   = new THREE.MeshStandardMaterial({color:0x1a0a2e, roughness:1});
const sofaMat  = new THREE.MeshStandardMaterial({color:0x2a1a4a, roughness:.8});
const glowMat  = (col) => new THREE.MeshStandardMaterial({color:col, emissive:col, emissiveIntensity:.4, roughness:.5});

// ═══════════════════════════════════════════════
//  GEOMETRY HELPERS
// ═══════════════════════════════════════════════
function box(w,h,d,mat,x=0,y=0,z=0,rx=0,ry=0,rz=0,shadow=true){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);
  m.rotation.set(rx,ry,rz);
  if(shadow){m.castShadow=true;m.receiveShadow=true;}
  scene.add(m); return m;
}
function cyl(rt,rb,h,seg,mat,x=0,y=0,z=0,shadow=true){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z);
  if(shadow){m.castShadow=true;m.receiveShadow=true;}
  scene.add(m); return m;
}
function sph(r,mat,x=0,y=0,z=0){
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),mat);
  m.position.set(x,y,z);
  m.castShadow=true;
  scene.add(m); return m;
}

// ═══════════════════════════════════════════════
//  OFFICE STRUCTURE
// ═══════════════════════════════════════════════
// Floor
const floorMesh = box(20,0.1,16,floorMat,0,-0.05,0,0,0,0,false);
floorMesh.receiveShadow=true; floorMesh.castShadow=false;

// Floor grid lines
const gridHelper = new THREE.GridHelper(20,20,0x1a1a3a,0x1a1a3a);
gridHelper.position.y=0.01;
scene.add(gridHelper);

// Walls
box(20,4,0.15,wallMat,0,2,-8); // back
box(0.15,4,16,wallMat,-10,2,0); // left
box(0.15,4,16,wallMat,10,2,0);  // right

// Divider wall (director office)
box(0.12,3,6,wallMat,2,1.5,-5);
box(6,0.12,0.12,glassMat,5,2.8,-5,0,0,0,false); // glass partition top

// Director office glass wall
box(6,3,0.12,glassMat,5,1.5,-8.1,0,0,0,false);

// Ceiling strips (neon)
const neonMat = new THREE.MeshStandardMaterial({color:0x00ff88,emissive:0x00ff88,emissiveIntensity:0.5});
[-3,0,3].forEach(x=>{
  const strip = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,8),neonMat);
  strip.position.set(x,3.9,-2);
  scene.add(strip);
});

// Director office neon (purple)
const dirNeon = new THREE.MeshStandardMaterial({color:0xcc88ff,emissive:0xcc88ff,emissiveIntensity:0.6});
const ds = new THREE.Mesh(new THREE.BoxGeometry(5.5,0.05,0.05),dirNeon);
ds.position.set(5,3.9,-5.1); scene.add(ds);

// ── WORKER DESKS (2 rows of 5) ──
const deskPositions = [
  [-7,-4.5,-3.5,-1.5,0.5],  // row z = -3
  [-7,-4.5,-3.5,-1.5,0.5],  // row z = 1
];
const deskZ = [-3.5, 0.5];
const workerDeskXs = [-7,-4.5,-2,0.5,3];

function makeDesk(x,z,agentIdx){
  const group = new THREE.Group();
  scene.add(group);
  group.position.set(x,0,z);

  // Desk top
  const dt = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.08,0.9),deskMat);
  dt.position.y=0.74; dt.castShadow=true; dt.receiveShadow=true;
  group.add(dt);

  // Desk legs
  [[-.8,.04,-.38],[.8,.04,-.38],[-.8,.04,.38],[.8,.04,.38]].forEach(([lx,ly,lz])=>{
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.7,0.06),deskDarkMat);
    leg.position.set(lx,ly*.5+0.35,lz);
    leg.castShadow=true; group.add(leg);
  });

  // MacBook
  const mb = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.025,0.48),
    new THREE.MeshStandardMaterial({color:0x999999,metalness:.8,roughness:.2}));
  mb.position.set(0,0.79,-.1); group.add(mb);

  // Screen
  const scr = new THREE.Mesh(new THREE.BoxGeometry(0.66,0.44,0.02),
    new THREE.MeshStandardMaterial({color:agentIdx<3?0x001a10:0x0a0816, emissive:agentIdx<3?0x003322:0x080814, emissiveIntensity:.5}));
  scr.position.set(0,1.02,-.33);
  scr.rotation.x=Math.PI/6; group.add(scr);

  // Coffee cup
  const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.05,0.12,8),
    new THREE.MeshStandardMaterial({color:0xdddddd}));
  cup.position.set(0.6,0.8,0.1); group.add(cup);
  const coffee = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.02,8),
    new THREE.MeshStandardMaterial({color:0x3d1a00}));
  coffee.position.set(0.6,0.865,0.1); group.add(coffee);

  // Plant on desk
  if(Math.random()>.4){
    const pot2 = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.06,0.1,8),potMat);
    pot2.position.set(-.7,0.8,0); group.add(pot2);
    const pl2 = new THREE.Mesh(new THREE.SphereGeometry(0.1,8,6),plantMat);
    pl2.position.set(-.7,0.93,0); group.add(pl2);
  }

  return group;
}

function makeChair(x,z){
  const g=new THREE.Group(); scene.add(g); g.position.set(x,0,z);
  // seat
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.06,0.6),chairMat);
  seat.position.y=0.5; seat.castShadow=true; g.add(seat);
  // back
  const back=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.55,0.06),chairMat);
  back.position.set(0,0.78,.28); back.castShadow=true; g.add(back);
  // wheels post
  const post=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.45,6),chairLegMat);
  post.position.y=0.25; g.add(post);
  // base
  const base=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.03,5),chairLegMat);
  base.position.y=0.04; g.add(base);
  return g;
}

// Human character builder
function makeHuman(skinColor, hairColor, shirtColor, sitting=true){
  const g=new THREE.Group();
  const skin=new THREE.MeshStandardMaterial({color:new THREE.Color(skinColor),roughness:.8});
  const hair=new THREE.MeshStandardMaterial({color:new THREE.Color(hairColor),roughness:.9});
  const shirt=new THREE.MeshStandardMaterial({color:new THREE.Color(shirtColor),roughness:.7});
  const pants=new THREE.MeshStandardMaterial({color:0x222244,roughness:.8});
  const shoe=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:.9});

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.18,16,12),skin);
  head.position.y=sitting?1.28:1.65; head.castShadow=true; g.add(head);

  // Hair
  const hairMesh=new THREE.Mesh(new THREE.SphereGeometry(0.185,12,8),hair);
  hairMesh.position.copy(head.position); hairMesh.position.y+=0.04;
  hairMesh.scale.y=0.6; hairMesh.castShadow=true; g.add(hairMesh);

  // Neck
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.07,0.1,8),skin);
  neck.position.y=sitting?1.1:1.47; g.add(neck);

  // Torso
  const torso=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.4,0.2),shirt);
  torso.position.y=sitting?0.88:1.25; torso.castShadow=true; g.add(torso);

  // Eyes
  const eyeGeo=new THREE.SphereGeometry(0.025,6,6);
  const eyeMat2=new THREE.MeshStandardMaterial({color:0x1a1a1a});
  [-0.07,0.07].forEach(ex=>{
    const eye=new THREE.Mesh(eyeGeo,eyeMat2);
    eye.position.set(ex,head.position.y+0.02,0.16);
    g.add(eye);
  });

  if(sitting){
    // Upper legs (horizontal)
    [-0.09,0.09].forEach((lx,i)=>{
      const ul=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.45),pants);
      ul.position.set(lx,0.58,0.1); g.add(ul);
      // Lower legs (hanging down)
      const ll=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.35,0.1),pants);
      ll.position.set(lx,0.38,0.35); g.add(ll);
      // Shoes
      const sh=new THREE.Mesh(new THREE.BoxGeometry(0.11,0.07,0.18),shoe);
      sh.position.set(lx,0.2,0.43); g.add(sh);
    });
    // Arms on desk
    [-0.18,0.18].forEach(ax=>{
      const arm=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.35),shirt);
      arm.position.set(ax,0.78,-.12); arm.castShadow=true; g.add(arm);
    });
  } else {
    // Standing arms/legs
    [-0.14,0.14].forEach((ax,i)=>{
      const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.055,0.38,8),shirt);
      arm.position.set(ax*1.5,1.05,0); arm.rotation.z=ax>0?.3:-.3; g.add(arm);
      const leg=new THREE.Mesh(new THREE.BoxGeometry(0.11,0.42,0.11),pants);
      leg.position.set(ax,0.6,0); g.add(leg);
      const sh=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.07,0.2),shoe);
      sh.position.set(ax,0.38,0.05); g.add(sh);
    });
  }

  return {group:g, head};
}

// Build all worker desks + chairs + people
const workerMeshes = [];
let agentIdx = 0;
deskZ.forEach(z=>{
  workerDeskXs.forEach(x=>{
    if(agentIdx>=10) return;
    const a=agents[agentIdx];
    makeDesk(x,z,agentIdx);
    makeChair(x,z+0.75);
    const {group:hg,head:hh}=makeHuman(a.skin,a.hair,a.shirt,true);
    hg.position.set(x,0,z+0.62);
    scene.add(hg);
    a.humanGroup=hg; a.humanHead=hh;
    workerMeshes.push({group:hg,head:hh,agent:a});
    agentIdx++;
  });
});

// ═══════════════════════════════════════════════
//  DIRECTOR OFFICE
// ═══════════════════════════════════════════════
// Rug
const rugMesh=new THREE.Mesh(new THREE.BoxGeometry(5.5,0.02,5.5),rugMat);
rugMesh.position.set(5.5,0.01,-6.5); scene.add(rugMesh);

// Big desk
const dirDesk=new THREE.Group(); scene.add(dirDesk);
dirDesk.position.set(5.5,0,-7);
const ddt=new THREE.Mesh(new THREE.BoxGeometry(3,0.1,1.2),
  new THREE.MeshStandardMaterial({color:0x5c3d1e,roughness:.6}));
ddt.position.y=0.85; dirDesk.add(ddt);
[[-.8,.04,-.55],[.8,.04,-.55],[-.8,.04,.55],[.8,.04,.55]].forEach(([lx,ly,lz])=>{
  const leg=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.8,0.08),deskDarkMat);
  leg.position.set(lx,0.45,lz); dirDesk.add(leg);
});
// Dir MacBook
const dmb=new THREE.Mesh(new THREE.BoxGeometry(0.9,0.03,0.6),
  new THREE.MeshStandardMaterial({color:0xaaaaaa,metalness:.8,roughness:.2}));
dmb.position.set(-0.3,0.92,-.1); dirDesk.add(dmb);
const dscr=new THREE.Mesh(new THREE.BoxGeometry(0.86,0.56,0.02),
  new THREE.MeshStandardMaterial({color:0x0a0020,emissive:0x220044,emissiveIntensity:.6}));
dscr.position.set(-0.3,1.2,-.42); dscr.rotation.x=Math.PI/6; dirDesk.add(dscr);
// Director coffee
const dcup=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.06,0.14,8),
  new THREE.MeshStandardMaterial({color:0x2c1a0a}));
dcup.position.set(0.9,0.92,0); dirDesk.add(dcup);

// Director chair
makeChair(5.5,-5.8);

// Director human (me — green shirt, standing out)
const {group:dirG, head:dirH}=makeHuman('#ffcc99','#1a1a2e','#2244cc',true);
dirG.position.set(5.5,0,-5.9);
scene.add(dirG);

// Director nameplate
const npGeo=new THREE.BoxGeometry(1.4,0.18,0.04);
const npMat=new THREE.MeshStandardMaterial({color:0x1a0a30,emissive:0x440088,emissiveIntensity:.3});
const np=new THREE.Mesh(npGeo,npMat); np.position.set(5.5,0.95,-6.42); scene.add(np);

// ═══════════════════════════════════════════════
//  PLANTS (large office plants)
// ═══════════════════════════════════════════════
function makePlant(x,z,scale=1){
  const pot=new THREE.Mesh(new THREE.CylinderGeometry(.18*scale,.15*scale,.3*scale,8),potMat);
  pot.position.set(x,0.15*scale,z); scene.add(pot);
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(.04*scale,.05*scale,.8*scale,6),
    new THREE.MeshStandardMaterial({color:0x2d5a1e,roughness:.9}));
  stem.position.set(x,.6*scale,z); scene.add(stem);
  [0,.8,1.6,2.4].forEach(angle=>{
    const leaf=new THREE.Mesh(new THREE.SphereGeometry(.2*scale,8,6),plantMat);
    leaf.position.set(x+Math.cos(angle)*.2*scale,.85*scale,z+Math.sin(angle)*.2*scale);
    leaf.scale.set(1,.6,1); scene.add(leaf);
  });
}
makePlant(-9.2,-7,1.2);
makePlant(9.2,-7,1.2);
makePlant(-9.2,3,1.0);
makePlant(3,-7.5,1.4); // director office plant
makePlant(8.2,-7.5,1.3);

// ═══════════════════════════════════════════════
//  REST ZONE
// ═══════════════════════════════════════════════
// Rug
const restRug=new THREE.Mesh(new THREE.BoxGeometry(5,0.02,4),
  new THREE.MeshStandardMaterial({color:0x1a0a10}));
restRug.position.set(-6,0.01,3.5); scene.add(restRug);

// Sofa

// ═══════════════════════════════════════════════
//  FLOATING STATUS LABELS (sprites)
// ═══════════════════════════════════════════════
function makeLabel(text, color='#00ffcc'){
  const canvas2=document.createElement('canvas');
  canvas2.width=256; canvas2.height=48;
  const ctx=canvas2.getContext('2d');
  ctx.fillStyle='rgba(10,9,22,0.85)';
  ctx.roundRect(0,0,256,48,8); ctx.fill();
  ctx.strokeStyle=color+'66';
  ctx.lineWidth=1;
  ctx.roundRect(0,0,256,48,8); ctx.stroke();
  ctx.fillStyle=color;
  ctx.font='bold 16px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,128,24);
  const tex=new THREE.CanvasTexture(canvas2);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(1.2,.28,1);
  return {sprite, canvas:canvas2, ctx, tex};
}

// Create labels for each agent

  workerDeskXs.forEach((x,col)=>{
    if(agentIdx>=10) return;
    const a=agents[agentIdx];
    const {sprite,canvas:c2,ctx:cx2,tex}=makeLabel(a.name,'#00ffcc');
    sprite.position.set(x,2.0,z-0.3);
    scene.add(sprite);
    a.labelSprite=sprite; a.labelCanvas=c2; a.labelCtx=cx2; a.labelTex=tex;
    agentIdx++;

});

// ═══════════════════════════════════════════════
//  STATE UPDATE
// ═══════════════════════════════════════════════
function updateLabel(a){
  const ctx=a.labelCtx, c=a.labelCanvas, tex=a.labelTex;
  const col=a.status==='active'?'#00ffcc':'#445566';
  ctx.clearRect(0,0,256,48);
  ctx.fillStyle='rgba(10,9,22,0.85)';
  ctx.roundRect(0,0,256,48,8); ctx.fill();
  ctx.strokeStyle=col+'66'; ctx.lineWidth=1;
  ctx.roundRect(0,0,256,48,8); ctx.stroke();
  ctx.fillStyle=col;
  ctx.font='bold 15px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const shortTask=a.task.length>20?a.task.slice(0,18)+'…':a.task;
  ctx.fillText(`${a.name} · ${shortTask}`,128,24);
  tex.needsUpdate=true;
}

function setAgent(id,status,task){
  const a=agents[id-1];
  a.status=status; a.task=task;
  // Panel
  const pd=document.getElementById(`pd-${id}`);
  const pt=document.getElementById(`pt-${id}`);
  const pb=document.getElementById(`pb-${id}`);
  const pc=document.getElementById(`pc-${id}`);
  const on=status==='active';
  pd.className='pdot'+(on?' on':'');
  pt.textContent=task; pt.className='ptask'+(on?' on':'');
  pb.className='pbar'+(on?' run':'');
  pc.className='pcard'+(on?' active':'');
  if(a.labelCtx) updateLabel(a);
  updateActiveCount();
  updateTicker();
}

window.setAgent=setAgent;

function updateActiveCount(){
  const n=agents.filter(a=>a.status==='active').length;
  document.getElementById('active-label').textContent=`${n} active`;
}

function updateTicker(){
  const items=[
    'Робочеловек на связи с Артуром',
    ...agents.filter(a=>a.status==='active').map(a=>`${a.name}: ${a.task.replace(/^\S+\s/,'')}`),
    'Cola в холодильнике бесплатная 🥤',
    'Офис работает в штатном режиме'
  ];
  document.getElementById('tick-inner').textContent=items.map(t=>`  ▶ ${t}`).join('   ');
}

async function fetchStatus(){
  try{
    const r=await fetch('status.json?t='+Date.now());
    if(!r.ok) return;
    const data=await r.json();
    data.agents.forEach(ag=>{
      setAgent(ag.id, ag.status, ag.task);
    });
  }catch(e){}
}

// ═══════════════════════════════════════════════
//  ANIMATION
// ═══════════════════════════════════════════════
const clock2=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock2.getElapsedTime();

  // Subtle camera drift
  camera.position.x=Math.sin(t*.05)*0.3;
  camera.lookAt(0,0,0);

  // Animate workers
  workerMeshes.forEach(({group,head,agent})=>{
    const ph=agent.phase;
    const spd=agent.status==='active'?2:0.7;
    const amp=agent.status==='active'?.025:.008;
    group.position.y=Math.sin(t*spd+ph)*amp;
    head.rotation.y=Math.sin(t*0.8+ph)*.08;
    if(agent.status==='active'){
      head.rotation.z=Math.sin(t*1.5+ph)*.04;
    }
  });

  // Director
  dirG.position.y=Math.sin(t*.9)*0.015;
  dirH.rotation.y=Math.sin(t*.5)*.06;

  renderer.render(scene,camera);
}
animate();

// Gentle auto-simulation for idle agents
setInterval(()=>{
  const TASKS=['💻 Пишет скрипт','📊 Анализирует данные','📄 Генерирует PDF','🔍 Ищет информацию','📝 Редактирует документ','🛠️ Тестирует код'];
  agents.slice(3).forEach(a=>{
    if(Math.random()>.65){
      const on=a.status!=='active';
      setAgent(a.id, on?'active':'idle', on?TASKS[Math.floor(Math.random()*TASKS.length)]:'💤 Свободен');
    }
  });
},15000);
