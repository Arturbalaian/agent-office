<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Agent HQ">
<title>Agent HQ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #07071a;
  font-family: 'Courier New', monospace;
  color: #ccc;
  overflow-x: hidden;
}

.header {
  background: #0d0d25;
  border-bottom: 2px solid #00ff88;
  padding: 7px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top: 0; z-index: 99;
}
.h-title { font-size: 12px; color: #00ff88; letter-spacing: 2px; }
.h-right { font-size: 10px; color: #ffff44; display:flex; gap:10px; }
.live { display:inline-block; width:5px; height:5px; background:#ff3333; border-radius:50%; animation: lp .9s infinite; margin-right:3px; }
@keyframes lp { 0%,100%{opacity:1} 50%{opacity:.1} }

.floor { padding: 8px; display:flex; flex-direction:column; gap:8px; padding-bottom:44px; }

.zone { border:2px solid #1a2a40; border-radius:6px; position:relative; padding:14px 8px 8px; }
.zone-label {
  position:absolute; top:-9px; left:10px;
  background:#07071a; padding:0 6px;
  font-size:8px; letter-spacing:2px; text-transform:uppercase; color:#445566;
}

/* ── WORKER GRID ── */
.worker-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

/* ── WORKER CARD ── */
.wcard {
  background: linear-gradient(160deg, #090920, #0b0b22);
  border: 1px solid #1a2055;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 2px 4px;
  gap: 3px;
  position: relative;
  min-width: 0;
  min-height: 140px;
  box-shadow: inset 0 0 8px #00000066;
}
.wcard canvas { display:block; }

.status-dot {
  position:absolute; top:3px; right:3px;
  width:5px; height:5px; border-radius:50%;
  background:#223344;
}
.status-dot.on { background:#00ff88; box-shadow:0 0 4px #00ff88; animation:sdp 1.5s infinite; }
@keyframes sdp { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Agent name — shown big */
.w-name {
  font-size:9px; color:#ffff88; font-weight:bold; letter-spacing:.5px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  width:100%; text-align:center; padding:0 1px;
}
/* Subtle robo number below name */
.w-num {
  font-size:5px; color:#334455; letter-spacing:.5px;
}

.w-task {
  font-size:8px; color:#6699aa;
  text-align:center;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  width:100%; padding:0 2px;
  min-height: 10px;
}
.w-task.active-task { color:#00ffcc; }

/* ── AGENT GLOW ICON ── */
.agent-icon-wrap {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  background: #06061a;
  border: 2px solid #1a2040;
  transition: box-shadow 0.4s, border-color 0.4s;
  box-shadow: 0 0 4px 1px #112233;
  margin: 2px 0;
  flex-shrink: 0;
}
.agent-icon-wrap.status-idle {
  box-shadow: 0 0 12px 4px #00ff88;
  border-color: #00ff8855;
}
.agent-icon-wrap.status-active {
  animation: pulse-blue 1.5s ease-in-out infinite;
  border-color: #00d4ff55;
}
.agent-icon-wrap.status-error {
  box-shadow: 0 0 12px 4px #ff3344;
  border-color: #ff334455;
}
.agent-icon-wrap.status-offline {
  box-shadow: 0 0 3px 1px #1a2233;
  border-color: #1a2040;
  opacity: 0.45;
}
@keyframes pulse-blue {
  0%, 100% { box-shadow: 0 0 8px 2px #00d4ff; }
  50% { box-shadow: 0 0 20px 8px #00d4ff; }
}
@keyframes actrun { 0%{width:0%} 100%{width:100%} }

/* ── TEAM CELL STYLES ── */
.team-row { display:flex; gap:2px; justify-content:center; align-items:flex-end; padding:1px 0; }
.wcard.team-card { border-color: #1a3040; background:#090d1a; }
.wcard.team-card .w-name { color:#ffff44; font-size:9px; letter-spacing:1px; }
.wcard.team-card .w-num { color:#2a4455; }

/* ── CORRIDOR ── */
.corridor {
  display:flex; align-items:center; justify-content:space-between;
  padding: 6px 12px; gap:6px; min-height:36px;
  border-color:#111120;
  background:#090912;
}
.corridor-path { flex:1; height:2px; background:repeating-linear-gradient(90deg,#1a2a40 0,#1a2a40 8px,transparent 8px,transparent 16px); }

/* ── MIDDLE ROW ── */
.mid-row { display:flex; gap:8px; }

/* ── REST ZONE ── */
.rest-zone { flex:1; background:#0a1018; border-color:#1a2530; }
.rest-items { display:flex; flex-direction:column; align-items:center; gap:8px; padding-top:4px; }
.sofa { font-size:32px; animation:sb 4s ease-in-out infinite; }
@keyframes sb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
.fridge-row { display:flex; align-items:center; gap:5px; background:#0d1520; border:1px solid #1a2535; padding:4px 8px; border-radius:3px; width:100%; justify-content:center; }
.free-tag { font-size:7px; color:#00ff88; background:#003311; border:1px solid #00ff8844; padding:1px 3px; border-radius:2px; }
.food-row { display:flex; gap:4px; font-size:14px; background:#0d1520; border:1px solid #1a2535; padding:4px 8px; border-radius:3px; width:100%; justify-content:center; }

/* ── DIRECTOR ZONE ── */
.dir-zone { flex:1.3; background:#0d0820; border-color:#2a1a40; }
.dir-inner { display:flex; flex-direction:column; align-items:center; gap:4px; }
.dir-plant { font-size:32px; animation:plantway 3s ease-in-out infinite; }
@keyframes plantway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
.dir-name { font-size:10px; color:#cc88ff; font-weight:bold; letter-spacing:2px; }
.dir-role { font-size:8px; color:#774499; }
.dir-task { font-size:8px; color:#00ffcc; min-height:11px; }
.dir-desk { background:#4a2d10; border:1px solid #6a3d18; border-bottom:3px solid #2a1a08; width:100%; padding:4px 8px; display:flex; align-items:center; justify-content:center; gap:6px; border-radius:2px; }
.macbook { width:30px; height:18px; background:#999; border:1px solid #bbb; border-radius:1px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.mb-screen { width:26px; height:15px; background:#100020; padding:1px; overflow:hidden; }
.mb-line { height:2px; background:#cc88ff; margin-bottom:1px; border-radius:1px; animation:mbl 1.1s ease-in-out infinite; }
@keyframes mbl { 0%{width:0%} 60%{width:100%} 100%{width:0%} }
.mb-base { width:34px; height:3px; background:#888; border-radius:0 0 2px 2px; }
.dir-act-wrap { width:90%; background:#1a1030; border:1px solid #332255; height:5px; border-radius:3px; overflow:hidden; }
.dir-act { height:100%; background:#cc88ff; border-radius:3px; animation:actrun 2s ease-in-out infinite; box-shadow:0 0 4px #cc88ff; }

/* ── ACTIVITY LOG ── */
.activity-panel {
  background: #080814;
  border-color: #1a3040;
}
.activity-log {
  max-height: 200px;
  overflow-y: auto;
  display: flex;
  flex-direction: column-reverse;
  gap: 3px;
  padding: 2px 0;
  scrollbar-width: thin;
  scrollbar-color: #1a3040 #080814;
}
.activity-log::-webkit-scrollbar { width: 4px; }
.activity-log::-webkit-scrollbar-track { background: #080814; }
.activity-log::-webkit-scrollbar-thumb { background: #1a3040; border-radius: 2px; }
.act-entry {
  display: flex;
  align-items: baseline;
  gap: 6px;
  padding: 2px 4px;
  border-radius: 3px;
  font-size: 10px;
  line-height: 1.4;
  border-left: 2px solid transparent;
  transition: background .2s;
}
.act-entry:hover { background: #0d0d20; }
.act-entry.new-entry { animation: fadeIn .4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.act-ts { color: #334455; font-size: 9px; flex-shrink: 0; min-width: 34px; }
.act-agent { font-weight: bold; font-size: 9px; flex-shrink: 0; min-width: 56px; }
.act-msg { color: #aabbcc; flex: 1; }
.act-entry.sys .act-msg { color: #44cc88; }
.act-entry.warn .act-msg { color: #ffcc44; }
.act-entry.error .act-msg { color: #ff5566; }
.act-panel-title {
  font-size: 9px; color: #445566; letter-spacing: 2px;
  margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between;
}
.act-badge {
  background: #0d2030; border: 1px solid #1a4060; color: #44aacc;
  font-size: 8px; padding: 1px 5px; border-radius: 10px;
}

/* ── TICKER ── */
.ticker { position:fixed; bottom:0; left:0; right:0; height:34px; background:#0d0d25; border-top:2px solid #00ff88; display:flex; align-items:center; overflow:hidden; }
.ticker-tag { background:#00ff88; color:#07071a; font-size:9px; font-weight:bold; padding:0 8px; height:100%; display:flex; align-items:center; flex-shrink:0; letter-spacing:1px; }
.ticker-body { display:flex; animation:tick 50s linear infinite; white-space:nowrap; font-size:10px; color:#00ffcc; }
@keyframes tick { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ti { margin:0 20px; }
.ti::before { content:'▶ '; color:#ff6b6b; }

/* ── TAB SWITCHER ── */
.tab-switcher {
  display: flex;
  gap: 8px;
  padding: 6px 8px 0;
}
.tab-btn {
  flex: 1;
  padding: 6px 10px;
  background: #0d0d25;
  border: 1px solid #1a3060;
  border-radius: 4px;
  color: #4488aa;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 4px #00000066;
}
.tab-btn:hover {
  border-color: #00d4ff55;
  color: #00d4ffaa;
  box-shadow: 0 0 8px #00d4ff33;
}
.tab-btn.active {
  background: #091828;
  border-color: #00d4ff;
  color: #00d4ff;
  box-shadow: 0 0 12px 2px #00d4ff55, inset 0 0 8px #00d4ff22;
  text-shadow: 0 0 8px #00d4ff;
}
</style>
</head>
<body>

<div class="header">
  <div class="h-title">🏢 AGENT HQ</div>
  <div class="h-right">
    <span id="active-count">0 active</span>
    <span><span class="live"></span><span id="clk">--:--</span></span>
  </div>
</div>

<div class="floor">

  <!-- TAB SWITCHER -->
  <div class="tab-switcher">
    <button class="tab-btn active" id="tab-agents" onclick="switchTab('agents')">⚡ Agents &amp; Teams</button>
    <button class="tab-btn" id="tab-builders" onclick="switchTab('builders')">🎬 AI Builders</button>
  </div>

  <!-- WORKER ZONE -->
  <div class="zone" id="zone-agents" style="background:#0c0c20;border-color:#1a2050;">
    <div class="zone-label">⚡ Agents & Teams</div>
    <div class="worker-grid" id="worker-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- AI BUILDERS ZONE -->
  <div class="zone" id="zone-builders" style="background:#0c1a10;border-color:#1a4020;display:none;">
    <div class="zone-label" style="color:#00ffaa;">🎬 AI Builders</div>
    <div class="worker-grid" id="builder-grid" style="grid-template-columns:repeat(4,1fr);gap:4px;">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- CORRIDOR -->
  <div class="zone corridor">
    <div class="zone-label">🚶 Corridor</div>
    <span style="font-size:18px">🌴</span>
    <span style="font-size:13px">🌿</span>
    <div class="corridor-path"></div>
    <span style="font-size:13px">🌿</span>
    <span style="font-size:18px">🌵</span>
  </div>

  <!-- MIDDLE ROW -->
  <div class="mid-row">

    <!-- SECRETARY -->
    <div class="zone rest-zone" style="border-color:#2a1a40;">
      <div class="zone-label" style="color:#aa66ff;">🤖 Secretary</div>
      <div class="rest-items">
        <canvas id="sec-canvas" width="60" height="68"></canvas>
        <div style="font:bold 9px monospace;color:#aa66ff;margin-top:2px;">SECRETARY</div>
        <div id="sec-task" style="font:7px monospace;color:#667799;text-align:center;max-width:110px;">💤 Waiting for task</div>
        <div class="agent-icon-wrap status-idle" id="glow-sec" style="width:38px;height:38px;font-size:18px;">📋</div>
      </div>
    </div>

    <!-- DIRECTOR -->
    <div class="zone dir-zone">
      <div class="zone-label">👑 Director</div>
      <div class="dir-inner">
        <div class="dir-plant">🌳</div>
        <canvas id="dir-canvas" width="80" height="90"></canvas>
        <div class="dir-name">ROBOHUMAN</div>
        <div class="dir-role">🤖 Head Agent</div>
        <div class="dir-task" id="dir-task">💬 In contact with Artur</div>
        <div class="dir-desk">
          <div>
            <div class="macbook"><div class="mb-screen">
              <div class="mb-line"></div>
              <div class="mb-line" style="animation-delay:.3s"></div>
              <div class="mb-line" style="animation-delay:.6s"></div>
            </div></div>
            <div class="mb-base"></div>
          </div>
          <span style="font-size:13px">☕</span>
        </div>
        <div class="dir-act-wrap"><div class="dir-act"></div></div>
      </div>
    </div>

  </div>

  <!-- ACTIVITY LOG -->
  <div class="zone activity-panel">
    <div class="zone-label">📋 ACTIVITY</div>
    <div class="act-panel-title">
      <span>AGENT LOG</span>
      <span class="act-badge" id="act-count">0 entries</span>
    </div>
    <div class="activity-log" id="activity-log">
      <!-- filled by JS -->
    </div>
  </div>

</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-tag">📡 LIVE</div>
  <div class="ticker-body" id="ticker"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ── AGENT ICONS MAP ──
const AGENT_ICONS = {
  'MOLTBOOK':  '💬',
  'ASSISTANT': '🤖',
  'SECRETARY': '📋',
  'SCOUT':     '🔍',
  'ANALYST':   '📊',
  'LAWYER':    '⚖️',
  'MARKETER':  '📣',
  'KALSHI':    '📈',
  'KRAKEN':    '🐙',
};
function getAgentIcon(name) { return AGENT_ICONS[name] || '🤖'; }

// ── AGENT DATA ──
// 10 cells total (same grid). type:'team' cells contain multiple mini-robots.
const agents = [
  { id:1,  name:'MOLTBOOK',   num:'Robo-1',    color:'#ff4466', active:false, task:'💤 Idle', type:'single' },
  { id:2,  name:'ASSISTANT',  num:'Robo-2',    color:'#ff8800', active:false, task:'💤 Idle', type:'single' },
  { id:3,  name:'SECRETARY',  num:'Robo-3',    color:'#ffcc00', active:false, task:'💤 Idle', type:'single' },
  { id:4,  name:'SCOUT',      num:'Robo-4',    color:'#44ff66', active:false, task:'💤 Idle', type:'single' },
  { id:5,  name:'ANALYST',    num:'Robo-7',    color:'#8844ff', active:false, task:'💤 Idle', type:'single' },
  { id:6,  name:'LAWYER',     num:'Robo-11',   color:'#66aaff', active:false, task:'💤 Idle', type:'single' },
  { id:7,  name:'MARKETER',   num:'Robo-12',   color:'#ff66aa', active:false, task:'💤 Idle', type:'single' },
  { id:8,  name:'ANALYST',    num:'Robo-13',   color:'#ffaa44', active:false, task:'💤 Idle', type:'single' },
  // KALSHI: merged Robo-9 + Robo-10 — position 9 (bottom row)
  { id:9,  name:'KALSHI',     num:'9·10',      color:'#aaffaa', active:false, task:'📊 prediction mkts',
    type:'team', teamColors:['#aaffaa','#ff6644'] },
  // KRAKEN: merged Robo-5 + Robo-6 + Robo-8 — position 10 (bottom row last)
  { id:10, name:'KRAKEN',     num:'5·6·8',     color:'#00ffcc', active:false, task:'₿ crypto 24/7',
    type:'team', teamColors:['#00ffcc','#00aaff','#ff44cc'] },
];

// ── BUILD WORKER CARDS ──
const grid = document.getElementById('worker-grid');
agents.forEach(a => {
  const card = document.createElement('div');
  card.className = 'wcard' + (a.type === 'team' ? ' team-card' : '');
  card.id = `card-${a.id}`;

  if (a.type === 'team') {
    // Multiple mini-robot canvases side by side
    const isLarge = a.teamColors.length === 2; // 2-robot team gets bigger canvases
    const cw = isLarge ? 33 : 22;
    const ch = isLarge ? 42 : 31;
    const canvasesHtml = a.teamColors.map((_, i) =>
      `<canvas id="cv-${a.id}-${i}" width="${cw}" height="${ch}"></canvas>`
    ).join('');
    card.innerHTML = `
      <div class="status-dot" id="dot-${a.id}"></div>
      <div class="agent-icon-wrap status-idle" id="glow-${a.id}">${getAgentIcon(a.name)}</div>
      <div class="team-row">${canvasesHtml}</div>
      <div class="w-name">${a.name}</div>
      <div class="w-num">${a.num}</div>
      <div class="w-task" id="task-${a.id}">${a.task}</div>
    `;
  } else {
    card.innerHTML = `
      <div class="status-dot" id="dot-${a.id}"></div>
      <div class="agent-icon-wrap status-idle" id="glow-${a.id}">${getAgentIcon(a.name)}</div>
      <canvas id="cv-${a.id}" width="57" height="68"></canvas>
      <div class="w-name">${a.name}</div>
      <div class="w-num">${a.num}</div>
      <div class="w-task" id="task-${a.id}">${a.task}</div>
    `;
  }
  grid.appendChild(card);
});

// ── AI BUILDERS ──
const builders = [
  { id:'b1', name:'BORDER',    role:'Border Patrol',   emoji:'🚔', color:'#ff6644' },
  { id:'b2', name:'GRITTY',    role:'Gritty/Homeless', emoji:'🏚️', color:'#ff9933' },
  { id:'b3', name:'ПЕРСОНАЖИ', role:'Мои персонажи',   emoji:'🎭', color:'#aa66ff' },
  { id:'b4', name:'ВЫСЕЛЕНИЕ', role:'Eviction Drama',  emoji:'🏠', color:'#ff4488' },
  { id:'b5', name:'ДОКТОР',    role:'Viral Doctor',    emoji:'🏥', color:'#44ccff' },
  { id:'b6', name:'ICE',       role:'ICE Enforcement', emoji:'❄️', color:'#66ffee' },
  { id:'b7', name:'ТАЙМЛАПС',  role:'Construction',    emoji:'🏗️', color:'#ffcc00' },
  { id:'b8', name:'ФАБРИКА',   role:'Prompt Factory',  emoji:'⚙️', color:'#88ff44' },
];
const bgrid = document.getElementById('builder-grid');
builders.forEach(b => {
  const card = document.createElement('div');
  card.className = 'wcard';
  card.style.cssText = 'border-color:' + b.color + '22;min-height:140px;';
  card.innerHTML = `
    <div class="status-dot" id="bdot-${b.id}" style="background:#333"></div>
    <div class="agent-icon-wrap status-idle" id="bglow-${b.id}" style="font-size:32px;">${b.emoji}</div>
    <div class="w-name" style="color:${b.color};font-size:9px;">${b.name}</div>
    <div class="w-task" id="btask-${b.id}" style="font-size:8px;color:#556677;">💤 Idle</div>
  `;
  bgrid.appendChild(card);
});

// ── THREE.JS CHARACTER FACTORY ──
function makeCharScene(canvasEl, color, scale=1) {
  const W = canvasEl.width, H = canvasEl.height;
  const renderer = new THREE.WebGLRenderer({canvas: canvasEl, antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(0, 0.3, 3.5);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(2, 4, 3);
  scene.add(dir);

  const mat = new THREE.MeshPhongMaterial({color: new THREE.Color(color), shininess:60});
  const eyeMat = new THREE.MeshPhongMaterial({color: 0xffffff, emissive: new THREE.Color(color), emissiveIntensity:.5});

  const group = new THREE.Group();
  group.scale.setScalar(scale);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3,16,12), mat);
  head.position.y = 0.75;
  group.add(head);

  // Eyes
  [-0.12, 0.12].forEach(x => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8), eyeMat);
    eye.position.set(x, 0.8, 0.27);
    group.add(eye);
  });

  // Body
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.26,0.55,12), mat);
  body.position.y = 0.18;
  group.add(body);

  // Arms
  const armGeo = new THREE.CylinderGeometry(0.07,0.07,0.4,8);
  [-1,1].forEach(side => {
    const arm = new THREE.Mesh(armGeo, mat);
    arm.position.set(side*0.34, 0.22, 0);
    arm.rotation.z = side * 0.4;
    arm.userData.isArm = true;
    arm.userData.side = side;
    group.add(arm);
  });

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.09,0.08,0.4,8);
  [-1,1].forEach(side => {
    const leg = new THREE.Mesh(legGeo, mat);
    leg.position.set(side*0.14, -0.28, 0);
    group.add(leg);
  });

  scene.add(group);

  return {renderer, scene, camera, group, head};
}

// ── INIT THREE.JS FOR ALL AGENTS ──
agents.forEach(a => {
  if (a.type === 'team') {
    const isLarge = a.teamColors.length === 2;
    const scale = isLarge ? 0.62 : 0.50;
    a.teamScenes = a.teamColors.map((c, i) => {
      const cv = document.getElementById(`cv-${a.id}-${i}`);
      const s = makeCharScene(cv, c, scale);
      s.phase = Math.random() * Math.PI * 2;
      return s;
    });
    a.phase = Math.random() * Math.PI * 2;
  } else {
    const cv = document.getElementById(`cv-${a.id}`);
    const s = makeCharScene(cv, a.color);
    a.renderer = s.renderer; a.scene = s.scene; a.camera = s.camera;
    a.group = s.group; a.head = s.head;
    a.phase = Math.random() * Math.PI * 2;
  }
});

// Director character
const dirCv = document.getElementById('dir-canvas');
const dir3d = makeCharScene(dirCv, '#00cc44', 1.3);
dir3d.phase = 0;

// Secretary character
const secCanvas = document.getElementById('sec-canvas');
if (secCanvas) makeCharScene(secCanvas, '#aa66ff', 0.85);

// ── ANIMATION LOOP ──
function animate(t) {
  requestAnimationFrame(animate);
  const time = t * 0.001;

  agents.forEach(a => {
    if (a.type === 'team') {
      a.teamScenes.forEach((ts, i) => {
        const ph = ts.phase;
        const speed = a.active ? 2.5 : 0.8;
        const amp = a.active ? 0.06 : 0.02;
        ts.group.position.y = Math.sin(time * speed + ph) * amp;
        ts.group.rotation.y = Math.sin(time * 0.5 + ph + i * 1.3) * 0.15;
        ts.group.children.forEach(c => {
          if (c.userData && c.userData.isArm) {
            c.rotation.z = c.userData.side * (0.4 + (a.active ? Math.sin(time * 3 + ph + i) * 0.3 : 0));
          }
        });
        ts.renderer.render(ts.scene, ts.camera);
      });
    } else {
      const ph = a.phase;
      const speed = a.active ? 2.5 : 0.8;
      const amp = a.active ? 0.06 : 0.02;
      a.group.position.y = Math.sin(time * speed + ph) * amp;
      a.group.rotation.y = Math.sin(time * 0.5 + ph) * 0.15;
      a.head.rotation.y = a.active ? Math.sin(time * 2 + ph) * 0.2 : 0;
      a.group.children.forEach(c => {
        if (c.userData && c.userData.isArm) {
          c.rotation.z = c.userData.side * (0.4 + (a.active ? Math.sin(time * 3 + ph) * 0.3 : 0));
        }
      });
      a.renderer.render(a.scene, a.camera);
    }
  });

  // Director
  dir3d.group.position.y = Math.sin(time * 1.2) * 0.03;
  dir3d.group.rotation.y = Math.sin(time * 0.4) * 0.1;
  dir3d.renderer.render(dir3d.scene, dir3d.camera);
}
animate(0);

// ── STATE UPDATES ──
function setAgent(id, active, task, status) {
  const a = agents[id-1];
  if (!a) return;
  a.active = active;
  a.task = task;

  const dot = document.getElementById(`dot-${id}`);
  const taskEl = document.getElementById(`task-${id}`);
  const glow = document.getElementById(`glow-${id}`);

  if (dot) dot.className = 'status-dot' + (active ? ' on' : '');
  if (taskEl) {
    taskEl.textContent = task;
    taskEl.className = 'w-task' + (active ? ' active-task' : '');
  }
  if (glow) {
    const glowStatus = status === 'error' ? 'status-error'
      : status === 'offline' ? 'status-offline'
      : active ? 'status-active'
      : 'status-idle';
    glow.className = 'agent-icon-wrap ' + glowStatus;
  }

  updateCount();
  updateTicker();
}

function updateCount() {
  const n = agents.filter(a => a.active).length;
  document.getElementById('active-count').textContent = `${n} active`;
}

// Expose globally so parent can call
window.setAgent = setAgent;

// ── TICKER ──
function updateTicker() {
  const items = [
    'Robohuman in contact with Artur',
    ...agents.filter(a=>a.active).map(a=>`${a.name}: ${a.task.replace(/^\S+\s/,'')}`),
    ...agents.filter(a=>!a.active).slice(0,3).map(a=>`${a.name}: idle`),
    'Cola in the fridge FREE 🥤',
    'KRAKEN trading crypto 24/7 ₿',
    'KALSHI monitoring prediction markets 📊',
  ];
  const doubled = [...items, ...items];
  document.getElementById('ticker').innerHTML = doubled.map(t=>`<span class="ti">${t}</span>`).join('');
}
updateTicker();

// ── CLOCK ──
setInterval(()=>{
  const n=new Date();
  document.getElementById('clk').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
},1000);

// ── UPDATE AI BUILDERS FROM API DATA ──
function updateBuilders(buildersData) {
  if (!buildersData) return;
  builders.forEach(b => {
    const bData = buildersData[b.id];
    if (!bData) return;
    const dot = document.getElementById(`bdot-${b.id}`);
    const taskEl = document.getElementById(`btask-${b.id}`);
    const glow = document.getElementById(`bglow-${b.id}`);
    const active = bData.status === 'active';
    const errored = bData.status === 'error';
    if (dot) {
      if (active) {
        dot.style.background = '#00ff88';
        dot.style.boxShadow = '0 0 4px #00ff88';
        dot.style.animation = 'sdp 1.5s infinite';
      } else {
        dot.style.background = '#333';
        dot.style.boxShadow = 'none';
        dot.style.animation = 'none';
      }
    }
    if (glow) {
      const glowStatus = errored ? 'status-error' : active ? 'status-active' : 'status-idle';
      glow.className = 'agent-icon-wrap ' + glowStatus;
    }
    if (taskEl) taskEl.textContent = active ? '⚙️ ' + (bData.task || 'Working') : (errored ? '❌ Error' : '💤 Idle');
  });
}

// ── POLL /api/status EVERY 2 SECONDS ──
function pollStatus() {
  fetch('/api/status')
    .then(r => r.json())
    .then(data => {
      // Update secretary
      if (data.subagent) updateSecretary(data);

      // Update agents
      const list = Array.isArray(data) ? data : (data.agents || []);
      list.forEach((item, i) => {
        if (i >= agents.length) return;
        const active = item.status === 'active';
        const errored = item.status === 'error';
        const offline = item.status === 'offline';
        const task = item.task || (active ? '⚙️ Task' : errored ? '❌ Error' : '💤 Idle');
        setAgent(i + 1, active, active ? task : (errored ? '❌ Error' : '💤 Idle'), item.status || 'idle');
      });

      // Update AI builders
      if (data.builders) updateBuilders(data.builders);

      // Update activity log
      if (Array.isArray(data.activity)) renderActivity(data.activity);
    })
    .catch(() => {});
}

// Start polling every 2 seconds
pollStatus();
setInterval(pollStatus, 2000);

// ── SECRETARY SUB-AGENT ──
function updateSecretary(data) {
  const secTask = document.getElementById('sec-task');
  const secGlow = document.getElementById('glow-sec');
  if (!secTask) return;
  const sub = data && data.subagent;
  if (sub && sub.status === 'active') {
    secTask.textContent = '⚙️ ' + (sub.task || 'Working');
    secTask.style.color = '#aa66ff';
    if (secGlow) secGlow.className = 'agent-icon-wrap status-active';
  } else {
    secTask.textContent = '💤 Waiting for task';
    secTask.style.color = '#667799';
    if (secGlow) secGlow.className = 'agent-icon-wrap status-idle';
  }
}

window.setSecretaryTask = function(task) {
  const el = document.getElementById('sec-task');
  const glow = document.getElementById('glow-sec');
  if (el) { el.textContent = '⚙️ ' + task; el.style.color = '#aa66ff'; }
  if (glow) glow.className = 'agent-icon-wrap status-active';
};

// ── ACTIVITY LOG ──
const AGENT_COLOR_MAP = {
  'MOLTBOOK':   '#ff4466',
  'ASSISTANT':  '#ff8800',
  'SECRETARY':  '#ffcc00',
  'SCOUT':      '#44ff66',
  'KRAKEN':     '#00ffcc',
  'ANALYST':    '#8844ff',
  'KALSHI':     '#aaffaa',
  'LAWYER':     '#66aaff',
  'MARKETER':   '#ff66aa',
  'System':     '#44cc88',
  // Legacy keys for backwards compat with old activity.json
  'Robo-1':'#ff4466','Robo-2':'#ff8800','Robo-3':'#ffcc00',
  'Robo-4':'#44ff66','Robo-5':'#00ffcc','Robo-6':'#00aaff',
  'Robo-7':'#8844ff','Robo-8':'#ff44cc','Robo-9':'#aaffaa',
  'Robo-10':'#ff6644','Robo-11':'#66aaff','Robo-12':'#ff66aa',
  'Robo-13':'#ffaa44',
  'Система': '#44cc88',
};

let lastActivityTs = null;

function getEntryClass(msg) {
  if (/system|online|updat/i.test(msg)) return 'sys';
  if (/⚠️|warn|error|err/i.test(msg)) return 'warn';
  if (/❌|fail|criti/i.test(msg)) return 'error';
  return '';
}

function renderActivity(entries) {
  const log = document.getElementById('activity-log');
  if (!log) return;

  const html = entries.map((e, i) => {
    const color = AGENT_COLOR_MAP[e.agent] || '#6699aa';
    const cls = getEntryClass(e.msg);
    const isNew = i === 0 && lastActivityTs !== null && e.ts !== lastActivityTs;
    return `<div class="act-entry${cls ? ' '+cls : ''}${isNew ? ' new-entry' : ''}" style="border-left-color:${color}22">
      <span class="act-ts">${e.ts}</span>
      <span class="act-agent" style="color:${color}">${e.agent}</span>
      <span class="act-msg">${e.msg}</span>
    </div>`;
  }).join('');

  log.innerHTML = html;

  const countEl = document.getElementById('act-count');
  if (countEl) countEl.textContent = `${entries.length} entries`;

  if (entries.length > 0) lastActivityTs = entries[0].ts;
}

// Activity is now loaded as part of pollStatus() every 2 seconds

// ── TAB SWITCHER ──
function switchTab(tab) {
  const zoneAgents = document.getElementById('zone-agents');
  const zoneBuilders = document.getElementById('zone-builders');
  const tabAgents = document.getElementById('tab-agents');
  const tabBuilders = document.getElementById('tab-builders');

  if (tab === 'agents') {
    zoneAgents.style.display = '';
    zoneBuilders.style.display = 'none';
    tabAgents.classList.add('active');
    tabBuilders.classList.remove('active');
  } else {
    zoneAgents.style.display = 'none';
    zoneBuilders.style.display = '';
    tabBuilders.classList.add('active');
    tabAgents.classList.remove('active');
  }
}
window.switchTab = switchTab;
